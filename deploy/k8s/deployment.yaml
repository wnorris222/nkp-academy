apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkp-academy
  namespace: nkp-academy
  labels:
    app.kubernetes.io/name: nkp-academy
    app.kubernetes.io/component: web
spec:
  # NOTE: with the default SQLite/PVC (ReadWriteOnce) backend keep replicas at 1.
  # Switch NKP_DATABASE_URL to PostgreSQL to scale out / let the HPA add pods.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nkp-academy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nkp-academy
        app.kubernetes.io/component: web
      annotations:
        # Scraped by NKP's platform Prometheus.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nkp-academy
          image: wnorris22/nkp:1.0.0  # override at deploy time
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: nkp-academy-config
            - secretRef:
                name: nkp-academy-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nkp-academy-data
        # readOnlyRootFilesystem needs a writable /tmp.
        - name: tmp
          emptyDir: {}
