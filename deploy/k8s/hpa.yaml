apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nkp-academy
  namespace: nkp-academy
  labels:
    app.kubernetes.io/name: nkp-academy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nkp-academy
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
# IMPORTANT: horizontal scaling requires a shared database. Point
# NKP_DATABASE_URL at PostgreSQL before raising minReplicas above 1 — the
# default SQLite-on-PVC backend is single-writer (ReadWriteOnce).
