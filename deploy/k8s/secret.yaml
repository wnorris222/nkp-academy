apiVersion: v1
kind: Secret
metadata:
  name: nkp-academy-secret
  namespace: nkp-academy
  labels:
    app.kubernetes.io/name: nkp-academy
type: Opaque
stringData:
  # Secret runtime configuration (overrides ConfigMap keys of the same name via
  # env precedence). Populate this when using PostgreSQL:
  #
  # NKP_DATABASE_URL: "postgresql+asyncpg://nkp:CHANGE_ME@postgres:5432/nkp_academy"
  #
  # Left as a placeholder so the manifest applies cleanly out of the box.
  PLACEHOLDER: "replace-with-real-secrets-or-use-an-external-secret-store"
