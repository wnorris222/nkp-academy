id: ncpcn-s4-platform-apps
title: 4.6 Configure Platform Applications
track: NCP-CN Section 4
order: 46
icon: star
summary: 'Platform applications are deployed on newly attached clusters and often depend on each other, so dependencies must be reviewed before customizing. Apps are enabled per cluster via the Kommander UI or the nkp create appdeployment CLI, with deployment scope and customization capabilities governed by the NKP license (Starter, Pro, Ultimate).

  '
questions:
- id: q151
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: When are platform applications deployed to a cluster?
  options:
  - id: a
    text: Only manually
  - id: b
    text: When a cluster is attached — NKP deploys certain platform applications on the newly attached cluster (customizable per workspace)
  - id: c
    text: Only via Helm
  - id: d
    text: Never automatically
  correct: b
  explanation: When a cluster is newly attached into the workspace, all applications enabled for the workspace are automatically enabled on and deployed to it.
  source:
    label: Platform Applications
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-platform-apps-c.html
    page: p.351
    quote: When attaching a cluster, NKP deploys certain platform applications on the newly attached cluster.
- id: q152
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Why must you note platform dependencies when customizing platform applications?
  options:
  - id: a
    text: For billing
  - id: b
    text: Because platform applications often depend on each other — if a required dependency fails to deploy, any dependent application also fails to deploy
  - id: c
    text: To pick a license
  - id: d
    text: No reason
  correct: b
  explanation: Check the application's required dependencies first — a failed required dependency causes the dependent application to fail to deploy.
  source:
    label: Platform Applications Dependencies
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-platform-apps-dependencies-c.html
    page: p.355
    quote: If a required dependency of a platform application fails to deploy, any dependent application also fails to deploy.
- id: q153
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What are the foundational applications, and why do they matter?
  options:
  - id: a
    text: Prometheus, Grafana, Loki
  - id: b
    text: flux, reloader, and traefik — you must enable them for any platform applications to work properly
  - id: c
    text: Velero and Rook Ceph
  - id: d
    text: Dex and Gatekeeper
  correct: b
  explanation: Foundational applications (flux, reloader, traefik) must be enabled for any platform applications to work properly.
  source:
    label: Platform Applications Dependencies
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-platform-apps-dependencies-c.html
    page: p.356
    quote: 'The foundational applications comprise of the following platform applications: flux... reloader... traefik...'
- id: q154
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: If a required dependency of a platform application fails to deploy, what happens?
  options:
  - id: a
    text: Nothing
  - id: b
    text: Any application that depends on it also fails to deploy
  - id: c
    text: It auto-installs the dependency
  - id: d
    text: The cluster is deleted
  correct: b
  explanation: Check the application's required dependencies first — a failed required dependency causes the dependent application to fail to deploy.
  source:
    label: Platform Applications Dependencies
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-platform-apps-dependencies-c.html
    page: p.355
    quote: If a required dependency of a platform application fails to deploy, any application that depends on it also fails to deploy.
- id: q155
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command shows which apps are enabled/disabled and their status across categories?
  options:
  - id: a
    text: nkp status apps
  - id: b
    text: kubectl get apps,clusterapps,appdeployments -A
  - id: c
    text: helm list
  - id: d
    text: kubectl get pods
  correct: b
  explanation: Use kubectl get apps,clusterapps,appdeployments -A to see the overall status across all categories.
  source:
    label: Platform Applications Dependencies
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-platform-apps-dependencies-c.html
    page: p.355
    quote: 'To view the applications that are enabled or disabled in each category, verify their status: kubectl get apps,clusterapps,appdeployments -A.'
- id: q157
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you enable a platform application from the UI?
  options:
  - id: a
    text: Edit etcd
  - id: b
    text: From Applications, select the app card's three-dot button > Enable, choose a version if offered, then Enable
  - id: c
    text: kubectl apply
  - id: d
    text: Restart Kommander
  correct: b
  explanation: From the Applications page, select the app card's three-dot button > Enable, choose a version if offered, then click Enable.
  source:
    label: 'Ultimate: Enabling an Application Using the UI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-enterprise-enable-an-app-using-ui-t.html
    page: p.335
    quote: Select the three-dot button of the desired application card > Enable. If available, select a version from the dropdown list... Confirm the details are correct and then select Enable.
- id: q158
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you customize an application's values while enabling it in the UI?
  options:
  - id: a
    text: You cannot
  - id: b
    text: Override the default configuration values in the Workspace Application Configuration text editor (or upload a YAML file)
  - id: c
    text: Edit the container
  - id: d
    text: Use SSH
  correct: b
  explanation: Override the default configuration values in the Workspace Application Configuration text editor, or upload a YAML file, while enabling the application.
  source:
    label: 'Ultimate: Enabling an Application Using the UI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-enterprise-enable-an-app-using-ui-t.html
    page: p.335
    quote: To customize an application for all clusters in a workspace, copy your customized values into the text editor under Workspace Application Configuration or upload your YAML file that contains the values.
- id: q160
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you disable a platform application from the UI?
  options:
  - id: a
    text: Delete the workspace
  - id: b
    text: Select the app card's three-dot button > Disable, then confirm with Disable Application
  - id: c
    text: Delete the namespace
  - id: d
    text: Uninstall NKP
  correct: b
  explanation: Select the app card's three-dot button > Disable, then confirm with Disable Application.
  source:
    label: Disable an Application Using the UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-essential-disable-an-app-using-ui-t.html
    page: ''
    quote: Select the three-dot button of the desired application card and select Disable... select Disable Application.
- id: q169
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command verifies that a platform application deployed successfully?
  options:
  - id: a
    text: kubectl get pods
  - id: b
    text: kubectl get helmreleases <app> -n ${WORKSPACE_NAMESPACE} -w (the HelmRelease must be Ready)
  - id: c
    text: nkp status
  - id: d
    text: helm status
  correct: b
  explanation: Verify with kubectl get helmreleases <app> -n ${WORKSPACE_NAMESPACE} -w; the HelmRelease must be marked Ready.
  source:
    label: Verify the Project Platform Applications
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-verify-the-project-platform-applications-t.html
    page: ''
    quote: Connect to the attached cluster and watch the HelmReleases to verify the deployment... kubectl get helmreleases kiali -n ${WORKSPACE_NAMESPACE} -w. HelmRelease must be marked as Ready.
- id: q178
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you disable/remove a platform application via the CLI?
  options:
  - id: a
    text: nkp disable app
  - id: b
    text: kubectl delete appdeployment -n <WORKSPACE_NAMESPACE> <app>
  - id: c
    text: helm uninstall only
  - id: d
    text: Delete the namespace
  correct: b
  explanation: Disable/remove a platform application via the CLI with kubectl delete appdeployment -n <WORKSPACE_NAMESPACE> <app>.
  source:
    label: Disable NKP-managed Ceph
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-disable-nkp-managed-ceph-t.html
    page: ''
    quote: kubectl delete appdeployment -n <WORKSPACE_NAMESPACE> rook-ceph-cluster.
