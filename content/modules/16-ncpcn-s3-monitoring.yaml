- id: q111
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How can you monitor your own applications' metrics with the stack?
  options:
  - id: a
    text: You cannot
  - id: b
    text: Service monitors collect internal Kubernetes components and can be extended to monitor customer applications
  - id: c
    text: Only via logs
  - id: d
    text: Only node metrics are supported
  correct: b
