id: ncpcn-s3-monitoring
title: 3.4 Monitoring & Health
track: NCP-CN Section 3
order: 34
icon: gauge
summary: 'Performance and health monitoring in NKP with the Prometheus-based stack and Grafana dashboards, covering per-cluster and centralized (Thanos/Karma) metrics and alerts, custom rules and dashboards, NKP node metrics, and the Kommander management tools used to diagnose cluster and platform-service health.

  '
questions:
- id: q97
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What open-source project is the NKP monitoring stack based on?
  options:
  - id: a
    text: Nagios
  - id: b
    text: Prometheus (and its broader ecosystem), pre-configured by Kommander
  - id: c
    text: Zabbix
  - id: d
    text: Datadog
  correct: b
  explanation: Kommander provides monitoring using a pre-configured stack based on the Prometheus open-source project and its ecosystem.
  source:
    label: Monitoring and Alerts
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-monitoring-and-alerts-c.html
    page: p.659
    quote: By default, Kommander provides monitoring services using a pre-configured monitoring stack based on the Prometheus open-source project and its broader ecosystem.
- id: q98
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: What does the default NKP monitoring stack provide? (Select all that apply)
  options:
  - id: a
    text: In-depth monitoring of Kubernetes components and platform services
  - id: b
    text: A default set of Grafana dashboards
  - id: c
    text: Predefined critical error and warning alerts
  - id: d
    text: Automatic log collection
  correct:
  - a
  - b
  - c
  explanation: The default monitoring stack provides in-depth monitoring of Kubernetes components/platform services, a default set of Grafana dashboards, and predefined critical/warning alerts. (Logging is a separate stack.)
  source:
    label: Monitoring and Alerts
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-monitoring-and-alerts-c.html
    page: p.659
    quote: Provides in-depth monitoring of Kubernetes components and platform services… Includes a default set of Grafana dashboards… Supports predefined critical error and warning alerts.
- id: q99
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What does the kube-prometheus-stack include?
  options:
  - id: a
    text: Only Prometheus
  - id: b
    text: Prometheus, Prometheus Alertmanager, and Grafana
  - id: c
    text: Loki and Fluentd
  - id: d
    text: Only Grafana
  correct: b
  explanation: Kube Prometheus Stack includes Prometheus, Prometheus Alertmanager, and Grafana.
  source:
    label: Cluster Metrics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-cluster-metrics-c.html
    page: p.359
    quote: Kube Prometheus Stack includes Prometheus, Prometheus Alertmanager, and Grafana.
- id: q101
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What role does Thanos play in the monitoring stack?
  options:
  - id: a
    text: It collects logs
  - id: b
    text: It is an HA, Prometheus-compatible solution offering unlimited data retention through object storage
  - id: c
    text: It manages nodes
  - id: d
    text: It is a load balancer
  correct: b
  explanation: Thanos is an open-source, HA, Prometheus-compatible solution that offers unlimited data retention through object storage.
  source:
    label: Platform Applications Dependencies
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-platform-apps-dependencies-c.html
    page: ''
    quote: 'thanos: An open-source, highly available Prometheus-compatible solution that offers unlimited data retention through object storage while remaining fully compatible with existing Prometheus tools.'
- id: q103
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Where is kube-prometheus-stack deployed by default?
  options:
  - id: a
    text: Management cluster only
  - id: b
    text: On the management cluster and attached clusters
  - id: c
    text: Worker nodes only
  - id: d
    text: It is not deployed by default
  correct: b
  explanation: The kube-prometheus-stack is deployed by default on the management cluster and attached clusters.
  source:
    label: Cluster Metrics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-cluster-metrics-c.html
    page: p.663
    quote: The kube-prometheus-stack is deployed by default on the management cluster and attached clusters.
- id: q105
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the URL to access the (per-cluster) Grafana UI?
  options:
  - id: a
    text: https://<CLUSTER_URL>/grafana-ui
  - id: b
    text: https://<CLUSTER_URL>/dkp/grafana
  - id: c
    text: https://<CLUSTER_URL>/monitoring
  - id: d
    text: http://localhost:3000
  correct: b
  explanation: Access the per-cluster Grafana UI at https://<CLUSTER_URL>/dkp/grafana.
  source:
    label: Disable Default Dashboards
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-disable-default-dashboards-t.html
    page: ''
    quote: To access the Grafana UI, browse to the landing page and then search for the Grafana dashboard, for example, https://<CLUSTER_URL>/dkp/grafana.
- id: q106
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How does NKP centralize metrics from all attached clusters?
  options:
  - id: a
    text: By copying Prometheus databases
  - id: b
    text: Thanos Query (on the management cluster) queries the Prometheus instances on attached clusters via a Thanos sidecar; Grafana uses Thanos Query as its data source
  - id: c
    text: Via SSH
  - id: d
    text: It cannot centralize metrics
  correct: b
  explanation: Thanos Query queries the Prometheus instances on attached clusters (via a Thanos sidecar per Prometheus), and Grafana uses Thanos Query as its data source for a global view.
  source:
    label: Centralized Metrics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-centralized-metrics-c.html
    page: ''
    quote: The Thanos Query component is installed on attached and managed clusters. Thanos Query queries the Prometheus instances on the attached clusters, using a Thanos sidecar… Grafana is configured with…
- id: q107
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the URL for the centralized Grafana UI?
  options:
  - id: a
    text: /dkp/grafana
  - id: b
    text: https://<CLUSTER_URL>/dkp/kommander/monitoring/grafana
  - id: c
    text: /dkp/thanos
  - id: d
    text: /monitoring/central
  correct: b
  explanation: The centralized Grafana UI is at https://<CLUSTER_URL>/dkp/kommander/monitoring/grafana (a separate instance from per-cluster Grafana).
  source:
    label: Centralized Metrics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-centralized-metrics-c.html
    page: p.669
    quote: 'You can access the centralized Grafana UI at: https://<CLUSTER_URL>/dkp/kommander/monitoring/grafana.'
- id: q109
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How are alerts centralized across attached clusters?
  options:
  - id: a
    text: Via email only
  - id: b
    text: Karma aggregates all alerts from the Alertmanagers running in the attached clusters into one dashboard
  - id: c
    text: Via Grafana only
  - id: d
    text: They are not centralized
  correct: b
  explanation: Karma aggregates all alerts from the Alertmanagers running in the attached clusters, giving one page to view/filter them.
  source:
    label: Centralized Alerts
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-centralized-alerts-c.html
    page: ''
    quote: A centralized view of alerts from attached clusters, is provided using an alert dashboard called Karma… Karma aggregates all alerts from the Alertmanagers running in the attached clusters…
- id: q114
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How frequently does NKP update node metrics for real-time viewing?
  options:
  - id: a
    text: Every 60 seconds
  - id: b
    text: It polls the backend store every 5 seconds (real-time, no manual refresh needed)
  - id: c
    text: Every 5 minutes
  - id: d
    text: Only on refresh
  correct: b
  explanation: NKP polls the backend store every 5 seconds, so node metrics update in real time without needing to refresh the view.
  source:
    label: Cluster Metrics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-cluster-metrics-c.html
    page: p.663
    quote: NKP has a listener on the metrics.k8s.io/v1beta1/nodes resource… We then poll that backend store every 5 seconds, so the metrics are updated in real time every 5 seconds without the need to refresh…
