- id: q112
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you add a custom Prometheus alert rule?
  options:
  - id: a
    text: Edit the Prometheus binary
  - id: b
    text: Define it under additionalPrometheusRulesMap in the kube-prometheus-stack overrides ConfigMap
  - id: c
    text: Use kubectl create alert
  - id: d
    text: It is not possible
  correct: b
  explanation: Add a custom rule under additionalPrometheusRulesMap in the kube-prometheus-stack overrides ConfigMap.
  source:
    label: Monitoring and Alerts
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-monitoring-and-alerts-c.html
    page: p.665
    quote: 'To create a custom alert rule named my-rule-name… additionalPrometheusRulesMap: my-rule-name: groups: - name: my_group rules: …'
- id: q113
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you enable or disable the default alert rules?
  options:
  - id: a
    text: Delete Prometheus
  - id: b
    text: 'Provide a kube-prometheus-stack-overrides ConfigMap (e.g., defaultRules.rules.node: false, or defaultRules.create: false) and reference it in the AppDeployment'
  - id: c
    text: Edit the kubelet
  - id: d
    text: Via the license
  correct: b
  explanation: 'Enable/disable default rules via a kube-prometheus-stack-overrides ConfigMap (e.g., defaultRules.rules.node: false to turn off node rules, or defaultRules.create: false to disable all) referenced by the AppDeployment.'
  source:
    label: Monitoring and Alerts
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-monitoring-and-alerts-c.html
    page: p.664
    quote: 'You can enable or disable the default alert rules by providing the desired configuration in an overrides ConfigMap… defaultRules: rules: node: false… defaultRules: create: false.'
- id: q114
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How frequently does NKP update node metrics for real-time viewing?
  options:
  - id: a
    text: Every 60 seconds
  - id: b
    text: It polls the backend store every 5 seconds (real-time, no manual refresh needed)
  - id: c
    text: Every 5 minutes
  - id: d
    text: Only on refresh
  correct: b
  explanation: NKP polls the backend store every 5 seconds, so node metrics update in real time without needing to refresh the view.
  source:
    label: Cluster Metrics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-cluster-metrics-c.html
    page: p.663
    quote: NKP has a listener on the metrics.k8s.io/v1beta1/nodes resource… We then poll that backend store every 5 seconds, so the metrics are updated in real time every 5 seconds without the need to refresh…
