- id: q108
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Are centralized cluster metrics backed up?
  options:
  - id: a
    text: Yes, automatically
  - id: b
    text: No — they are read remotely from Kommander; if an attached cluster goes down, Kommander no longer collects/presents its metrics (including past data)
  - id: c
    text: Only on Ultimate
  - id: d
    text: Only with Velero
  correct: b
  explanation: Centralized metrics are read remotely from Kommander and are not backed up; if an attached cluster goes down, Kommander no longer collects or presents its metrics, including past data.
  source:
    label: Centralized Metrics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-centralized-metrics-c.html
    page: p.669
    quote: Cluster metrics are read remotely from Kommander; they are not backed up. If an attached cluster goes down, Kommander no longer collects or presents its metrics, including past data.
