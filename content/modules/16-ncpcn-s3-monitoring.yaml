    page: p.661
    quote: 'Kubernetes Components: API Server, Nodes, Pods, Kubelet, Scheduler, StatefulSets and Persistent Volumes; Kubernetes USE method: Cluster and Nodes; Calico; etcd; Prometheus.'
- id: q117
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you add a custom Grafana dashboard in Kommander?
  options:
  - id: a
    text: Edit Grafana's source
  - id: b
    text: 'Create a ConfigMap containing the dashboard JSON, labeled grafana_dashboard: "1"; the Grafana sidecar imports it automatically'
  - id: c
    text: Upload via FTP
  - id: d
    text: It is not supported
  correct: b
  explanation: 'Create a ConfigMap containing the dashboard JSON and label it grafana_dashboard: "1"; the Grafana dashboard sidecar imports it automatically when you apply it.'
  source:
    label: Monitoring and Alerts
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-monitoring-and-alerts-c.html
    page: p.662
    quote: 'insert it into a ConfigMap… labels: grafana_dashboard: "1"… Apply the ConfigMap, which automatically gets imported to Grafana using the Grafana dashboard sidecar.'
- id: q118
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you disable the default Grafana dashboards?
  options:
  - id: a
    text: Delete Grafana
  - id: b
    text: 'Provide an overrides ConfigMap with grafana.defaultDashboardsEnabled: false, referenced by the kube-prometheus-stack AppDeployment'
  - id: c
    text: Turn off Prometheus
  - id: d
    text: Remove the license
  correct: b
  explanation: 'Disable defaults with an overrides ConfigMap setting grafana.defaultDashboardsEnabled: false, then reference it from the kube-prometheus-stack AppDeployment''s configOverrides.'
  source:
    label: Monitoring and Alerts
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-monitoring-and-alerts-c.html
    page: p.661
    quote: 'grafana: defaultDashboardsEnabled: false… Edit the kube-prometheus-stack AppDeployment to replace the spec.configOverrides.name value with kube-prometheus-stack-overrides.'
