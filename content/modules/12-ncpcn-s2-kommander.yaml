- id: q41
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which flag makes the CLI not wait for all applications to become available?
  options:
  - id: a
    text: --no-wait
  - id: b
    text: --wait=false
  - id: c
    text: --async
  - id: d
