- id: q57
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Can you enable FIPS mode on an existing cluster?
  options:
  - id: a
    text: Yes, with a flag
  - id: b
    text: No — you must create a new cluster with FIPS enabled, and a FIPS cluster must remain FIPS (status cannot change)
  - id: c
    text: Yes, via the UI
  - id: d
    text: Only for worker nodes
  correct: b
  explanation: You cannot apply FIPS to an existing cluster — you must create a new FIPS cluster, and a FIPS cluster must remain FIPS (status can't be changed).
  source:
    label: FIPS Support in NKP
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-fips-140-support-nkp-c.html
    page: p.1026
    quote: You cannot apply FIPS mode to an existing cluster. You must create a new cluster with FIPS enabled… you cannot change the FIPS status after creating it.
