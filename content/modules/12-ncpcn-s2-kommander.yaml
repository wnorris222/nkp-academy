    quote: If you prefer using the CLI to not wait for all applications to be available, you can set the flag to --wait=false.
- id: q42
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: An application fails to deploy. How do you check that application's status?
  options:
  - id: a
    text: kubectl -n kommander get helmrelease <HELMRELEASE_NAME>
  - id: b
    text: nkp app status
  - id: c
