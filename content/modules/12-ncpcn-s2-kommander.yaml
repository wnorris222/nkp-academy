id: ncpcn-s2-kommander
title: 2.2 Deploy Kommander & Apply Licenses
track: NCP-CN Section 2
order: 22
icon: crown
summary: 'Covers installing and configuring the Kommander component of NKP: generating and customizing the installer config file, managing platform applications (HelmReleases), diagnosing and troubleshooting deployments, and handling minimal, air-gapped, and FIPS installs. Also covers applying the appropriate NKP licenses (Starter, Pro, Ultimate).

  '
questions:
- id: q35
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command generates a default Kommander installer configuration file?
  options:
  - id: a
    text: nkp install kommander --init > kommander.yaml
  - id: b
    text: nkp config kommander
  - id: c
    text: nkp get kommander-config
  - id: d
    text: kubectl create kommander
  correct: a
  explanation: Generate a default installer configuration file with nkp install kommander --init > kommander.yaml.
  source:
    label: Installing Kommander in a Non-air-gapped Environment
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-install-kommander-in-non-air-gapped-env-t.html
    page: ''
    quote: Create a configuration file for the deployment. nkp install kommander --init > kommander.yaml
- id: q36
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you install Kommander using a customized configuration file?
  options:
  - id: a
    text: nkp install kommander --installer-config kommander.yaml --kubeconfig=${CLUSTER_NAME}.conf
  - id: b
    text: nkp apply -f kommander.yaml
  - id: c
    text: helm install kommander
  - id: d
    text: nkp install kommander --file kommander.yaml
  correct: a
  explanation: Install with a custom config via --installer-config kommander.yaml (and --kubeconfig).
  source:
    label: 'Essential License — Install Kommander (Non-air-gapped)'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-essential-license-install-kommander-non-air-gapped-env-t.html
    page: ''
    quote: Use the customized kommander.yaml to install NKP. nkp install kommander --installer-config kommander.yaml --kubeconfig=${CLUSTER_NAME}.conf
- id: q39
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which commands log you into the dashboard and retrieve the URL/credentials?
  options:
  - id: a
    text: nkp open dashboard and nkp get dashboard
  - id: b
    text: kubectl proxy
  - id: c
    text: nkp ui
  - id: d
    text: nkp login
  correct: a
  explanation: Use nkp open dashboard to log in, and nkp get dashboard to retrieve the URL and credentials at any time.
  source:
    label: 'Nutanix Air-gapped: Verify Kommander and Log in to the UI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-nutanix-ag-basic-komm-login-ui-t.html
    page: ''
    quote: nkp open dashboard --kubeconfig=${CLUSTER_NAME}.conf … Retrieve the URL and credentials at any time… nkp get dashboard --kubeconfig=${CLUSTER_NAME}.conf
    label2: 'Pre-provisioned FIPS Air-gapped: Verify Kommander and Log in to the UI'
    url2: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-preprovFIPSAG-verify-komm-login-ui-t.html
- id: q40
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command checks Kommander install status by waiting for all HelmReleases to be Ready?
  options:
  - id: a
    text: kubectl -n kommander wait --for condition=Ready helmreleases --all --timeout 15m
  - id: b
    text: nkp status kommander
  - id: c
    text: kubectl get pods
  - id: d
    text: helm list
  correct: a
  explanation: Check install status with kubectl -n kommander wait --for condition=Ready helmreleases --all --timeout 15m.
  source:
    label: Verify Kommander Installation and Log in to the UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-verify-komm-login-ui-t.html
    page: ''
    quote: kubectl -n kommander wait --for condition=Ready helmreleases --all --timeout 15m
- id: q42
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: An application fails to deploy. How do you check that application's status?
  options:
  - id: a
    text: kubectl -n kommander get helmrelease <HELMRELEASE_NAME>
  - id: b
    text: nkp app status
  - id: c
    text: docker ps
  - id: d
    text: kubectl get svc
  correct: a
  explanation: Check a failing application with kubectl -n kommander get helmrelease <HELMRELEASE_NAME>.
  source:
    label: Verify Kommander Install
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-verify-kommander-install-t.html
    page: ''
    quote: If an application fails to deploy, check the status of the HelmRelease using the following command. kubectl -n kommander get helmrelease <HELMRELEASE_NAME>
- id: q44
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In which namespace do the Kommander platform applications (HelmReleases) run?
  options:
  - id: a
    text: default
  - id: b
    text: kommander
  - id: c
    text: kube-system
  - id: d
    text: flux-system
  correct: b
  explanation: Kommander platform applications (HelmReleases) run in the kommander namespace.
  source:
    label: Project Deployments Troubleshooting
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-project-deployments-troubleshooting-t.html
    page: ''
    quote: kubectl -n kommander wait --for condition=Ready helmreleases --all… kubectl -n kommander get helmrelease…
- id: q45
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What resource type represents each Kommander platform application?
  options:
  - id: a
    text: Deployment
  - id: b
    text: A HelmRelease (helm.toolkit.fluxcd.io)
  - id: c
    text: StatefulSet
  - id: d
    text: Pod
  correct: b
  explanation: Each Kommander platform application is represented by a HelmRelease (helm.toolkit.fluxcd.io).
  source:
    label: 'Pre-provisioned Air-gapped — Verify Kommander and Log in to the UI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-preprovAG-custom-verify-komm-login-ui-t.html
    page: ''
    quote: helmrelease.helm.toolkit.fluxcd.io/kommander condition met… /traefik condition met… /velero condition met
- id: q47
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In the installer config, how do you exclude a platform application from installation?
  options:
  - id: a
    text: Delete it from the file
  - id: b
    text: 'Set enabled: false under apps.<app-name>'
  - id: c
    text: Comment it out
  - id: d
    text: Use --skip
  correct: b
  explanation: 'Exclude an application by setting enabled: false under apps.<app-name> in the config.'
  source:
    label: Installing Kommander in a Small Environment
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-install-kommander-in-small-env-t.html
    page: ''
    quote: Applications that have enabled set to false are not taken into account during installation.
- id: q54
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: 'Use case: a small single-cluster demo. How do you install a minimal Kommander?'
  options:
  - id: a
    text: 'Init with -o yaml, set non-essential apps to enabled: false, then install with --installer-config'
  - id: b
    text: Use --minimal flag only
  - id: c
    text: Install everything then delete apps
  - id: d
    text: It is not possible
  correct: a
  explanation: 'Init the config with -o yaml, set non-essential apps to enabled: false, then install with --installer-config — the minimal setup deploys apps and the UI without cost/logging/alerting/object-storage apps.'
  source:
    label: Installing Kommander in a Small Environment
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-install-kommander-in-small-env-t.html
    page: p.991
    quote: nkp install kommander --init --kubeconfig=${CLUSTER_NAME}.conf -oyaml > kommander_minimal.yaml… Applications that have enabled set to false are not taken into account…
- id: q55
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: 'Use case: enable the logging stack in a minimal install. Which applications must you enable?'
  options:
  - id: a
    text: Only grafana-logging
  - id: b
    text: grafana-logging, grafana-loki, logging-operator, rook-ceph, and rook-ceph-cluster
  - id: c
    text: Only kube-prometheus-stack
  - id: d
    text: dex and traefik
  correct: b
  explanation: 'To enable the logging stack, set enabled: true for grafana-logging, grafana-loki, logging-operator, rook-ceph, and rook-ceph-cluster.'
  source:
    label: Installing Kommander in a Small Environment
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-install-kommander-in-small-env-t.html
    page: p.991
    quote: if you want to enable the logging stack, set enabled to true for grafana-logging, grafana-lokilogging-operator, rook-ceph and rook-ceph-cluster.
- id: q59
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: 'Use case: reconfigure Kommander applications after the initial install. Which command applies changes?'
  options:
  - id: a
    text: Rerun nkp install kommander --installer-config kommander.yaml --kubeconfig=... (works post-install too)
  - id: b
    text: nkp reconfigure
  - id: c
    text: helm upgrade
  - id: d
    text: Reinstall the cluster
  correct: a
  explanation: Rerun nkp install kommander --installer-config kommander.yaml --kubeconfig=... — this works after the initial install to reconfigure applications.
  source:
    label: Install Kommander with a Configuration File
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-install-kommander-with-config-file-t.html
    page: ''
    quote: To reconfigure applications, you can also run this command after the initial installation. nkp install kommander --installer-config kommander.yaml --kubeconfig=${CLUSTER_NAME}.conf
- id: q60
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What default license key does NKP assign when you create a cluster?
  options:
  - id: a
    text: Always Ultimate
  - id: b
    text: Starter for AHV installations, Pro for all other infrastructure providers
  - id: c
    text: Always Starter
  - id: d
    text: None
  correct: b
  explanation: 'On cluster creation NKP assigns a default key: Starter for AHV, Pro for all other providers; replace it with your purchased key.'
  source:
    label: Adding an NKP License
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-add-nkp-license-t.html
    page: p.26
    quote: The default key is either a Starter for AHV installations or a Pro for all other infrastructure providers.
- id: q62
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Applying a Pro or Ultimate license installs which application, and which installs only with Ultimate?
  options:
  - id: a
    text: Prometheus / Traefik
  - id: b
    text: AI Navigator (Pro & Ultimate) / Centralized Grafana (Ultimate only)
  - id: c
    text: Dex / Velero
  - id: d
    text: Nothing extra
  correct: b
  explanation: Applying a Pro or Ultimate key installs the AI Navigator App; Centralized Grafana installs only with an Ultimate key.
  source:
    label: Adding an NKP License
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-add-nkp-license-t.html
    page: p.27
    quote: if you apply Pro or Ultimate license key, NKP installs the AI Navigator App… NKP installs Centralized Grafana only when you apply an Ultimate license key.
- id: q63
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Why should you avoid applying an Ultimate license in a small single-cluster (demo/test) environment?
  options:
  - id: a
    text: It is cheaper to use Starter
  - id: b
    text: Ultimate is designed for multi-cluster/fleet management and requires more resources; applying it can exhaust a small environment
  - id: c
    text: Ultimate disables the UI
  - id: d
    text: It is not supported on Nutanix
  correct: b
  explanation: Ultimate is designed for multi-cluster/fleet management and requires a minimum amount of resources; applying it to a small single-cluster environment can exhaust its resources.
  source:
    label: Installing Kommander in a Small Environment
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-install-kommander-in-small-env-t.html
    page: p.992
    quote: The Ultimate license is designed for multi-cluster environments and fleet management, which require a minimum number of resources. Applying an Ultimate license key… can exhaust a small environment's resources.
- id: q64
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: 'In the minimal Kommander YAML, how are applications with enabled: false treated during installation?'
  options:
  - id: a
    text: They are installed but disabled
  - id: b
    text: They are not taken into account (not installed)
  - id: c
    text: They are queued
  - id: d
    text: They cause an error
  correct: b
  explanation: 'Applications with enabled: false in the minimal YAML are not taken into account during installation (not installed).'
  source:
    label: Installing Kommander in a Small Environment
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-install-kommander-in-small-env-t.html
    page: p.991
    quote: Applications that have enabled set to false are not taken into account during installation.
