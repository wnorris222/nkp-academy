- id: q56
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: 'Use case: create a FIPS-compliant cluster. Which flags are used?'
  options:
  - id: a
    text: --fips-mode only
  - id: b
    text: --kubernetes-version=v<version>+fips.0, --kubernetes-image-repository=docker.io/mesosphere, and --etcd-image-repository=docker.io/mesosphere --etcd-version=<etcd-version>+fips.0
