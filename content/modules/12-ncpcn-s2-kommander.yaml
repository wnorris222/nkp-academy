    quote: If an application fails to deploy, check the status of the HelmRelease using the following command. kubectl -n kommander get helmrelease <HELMRELEASE_NAME>
- id: q43
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: A HelmRelease is stuck in a broken/exhausted state. How do you trigger a reconciliation?
  options:
  - id: a
    text: Delete the namespace
  - id: b
    text: Patch spec.suspend to true, then back to false (kubectl -n kommander patch helmrelease ...)
  - id: c
    text: Restart the API server
  - id: d
    text: Reapply the license
  correct: b
  explanation: Trigger reconciliation by patching the HelmRelease's spec.suspend to true, then back to false.
  source:
    label: Additional Kommander Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-addl-kommander-config-c.html
    page: p.85
    quote: 'kubectl -n kommander patch helmrelease <HELMRELEASE_NAME> … "path": "/spec/suspend", "value": true … then … "value": false'
