    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-addl-kommander-config-c.html
    page: p.85
    quote: nkp open dashboard --kubeconfig=${CLUSTER_NAME}.conf … Retrieve the URL and credentials at any time… nkp get dashboard --kubeconfig=${CLUSTER_NAME}.conf
