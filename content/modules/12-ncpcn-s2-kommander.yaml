id: ncpcn-s2-kommander
title: 2.2 Deploy Kommander & Apply Licenses
track: NCP-CN Section 2
order: 22
icon: crown
summary: 'Covers installing and configuring the Kommander component of NKP: generating and customizing the installer config file, managing platform applications (HelmReleases), diagnosing and troubleshooting deployments, and handling minimal, air-gapped, and FIPS installs. Also covers applying the appropriate NKP licenses (Starter, Pro, Ultimate).

  '
questions:
- id: q33
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command installs the Kommander component of NKP?
  options:
  - id: a
    text: nkp deploy kommander
  - id: b
    text: nkp install kommander (with --kubeconfig=${CLUSTER_NAME}.conf)
  - id: c
    text: kubectl install kommander
  - id: d
    text: nkp kommander up
  correct: b
  explanation: Install Kommander with nkp install kommander, using --kubeconfig=${CLUSTER_NAME}.conf to target the correct cluster; it brings up the UI dashboard.
  source:
    label: Additional Kommander Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-addl-kommander-config-c.html
    page: p.84
    quote: nkp install kommander --installer-config kommander.yaml --kubeconfig=${CLUSTER_NAME}.conf
- id: q34
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What does the --kubeconfig=${CLUSTER_NAME}.conf flag ensure during the Kommander install?
  options:
  - id: a
    text: It enables FIPS
  - id: b
    text: It ensures Kommander installs on the correct (intended) cluster
  - id: c
    text: It sets the license
  - id: d
    text: It skips validation
  correct: b
  explanation: The --kubeconfig flag ensures you install Kommander on the correct/intended cluster.
  source:
    label: Additional Kommander Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-addl-kommander-config-c.html
    page: p.83
    quote: The --kubeconfig=${CLUSTER_NAME}.conf flag ensures that you install Kommander on the correct cluster.
- id: q35
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command generates a default Kommander installer configuration file?
  options:
  - id: a
    text: nkp install kommander --init > kommander.yaml
  - id: b
    text: nkp config kommander
  - id: c
    text: nkp get kommander-config
  - id: d
    text: kubectl create kommander
  correct: a
  explanation: Generate a default installer configuration file with nkp install kommander --init > kommander.yaml.
  source:
    label: Additional Kommander Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-addl-kommander-config-c.html
    page: p.83
    quote: Create a configuration file for the deployment. nkp install kommander --init > kommander.yaml
- id: q36
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you install Kommander using a customized configuration file?
  options:
  - id: a
    text: nkp install kommander --installer-config kommander.yaml --kubeconfig=${CLUSTER_NAME}.conf
  - id: b
    text: nkp apply -f kommander.yaml
  - id: c
    text: helm install kommander
  - id: d
    text: nkp install kommander --file kommander.yaml
  correct: a
  explanation: Install with a custom config via --installer-config kommander.yaml (and --kubeconfig).
  source:
    label: Additional Kommander Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-addl-kommander-config-c.html
    page: p.84
    quote: Use the customized kommander.yaml to install NKP. nkp install kommander --installer-config kommander.yaml --kubeconfig=${CLUSTER_NAME}.conf
- id: q37
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Applications take longer to deploy and the install times out. Which flag allocates more time?
  options:
  - id: a
    text: --timeout-extend
  - id: b
    text: --wait-timeout <time> (e.g., 1h)
  - id: c
    text: --retry
  - id: d
    text: --slow
  correct: b
  explanation: Add --wait-timeout <time> (e.g., 1h) to allocate more time when app deployment times out.
  source:
    label: Additional Kommander Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-addl-kommander-config-c.html
    page: p.83
    quote: Applications can take longer to deploy and time out the installation. Add the --wait-timeout <time to wait> flag and specify a period (for example, 1h)…
- id: q38
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: If the Kommander installation fails or you want to reconfigure applications, what can you do?
  options:
  - id: a
    text: Delete the cluster
  - id: b
    text: Rerun the install command to retry
  - id: c
    text: Reboot all nodes
  - id: d
    text: Reinstall the OS
  correct: b
  explanation: If the install fails or you want to reconfigure applications, simply rerun the install command to retry.
  source:
    label: Additional Kommander Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-addl-kommander-config-c.html
    page: p.83
    quote: If the Kommander installation fails, or you want to reconfigure applications, rerun the install command to retry.
- id: q39
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which commands log you into the dashboard and retrieve the URL/credentials?
  options:
  - id: a
    text: nkp open dashboard and nkp get dashboard
  - id: b
