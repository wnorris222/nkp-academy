- id: q94
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Can you disconnect a managed cluster that was created with Kommander?
  options:
  - id: a
    text: Yes, detach it
  - id: b
    text: No — you cannot disconnect it; you delete it (recommended through the NKP UI), which removes the cluster and its cloud assets
  - id: c
    text: Only via CLI
  - id: d
    text: Only with Ultimate
  correct: b
  explanation: You cannot disconnect a Kommander-created managed cluster — you delete it (recommended through the NKP UI), which removes the cluster and all its cloud assets.
