- id: q32
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Granting a user admin privileges on /dkp/* has what effect on sub-resources?
  options:
  - id: a
    text: No effect on sub-resources
  - id: b
    text: It grants admin privileges to all sub-resources, even if bindings exist for sub-resources with fewer privileges
  - id: c
    text: It restricts sub-resources
  - id: d
    text: It only affects /dkp/kommander/
  correct: b
  explanation: Granting admin on /dkp/* grants admin to all sub-resources, even if bindings exist for sub-resources with fewer privileges.
