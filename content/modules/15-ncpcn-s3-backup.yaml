- id: q93
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command performs the restore from a selected backup?
  options:
  - id: a
    text: velero restore create --from-backup <backup-name>
  - id: b
    text: velero backup restore
  - id: c
    text: kubectl apply restore
  - id: d
    text: nkp cluster restore
  correct: a
  explanation: Perform the restore with velero restore create --from-backup <backup-name>.
