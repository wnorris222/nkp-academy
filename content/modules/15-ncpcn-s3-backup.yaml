id: ncpcn-s3-backup
title: 3.3 Backup & Recovery
track: NCP-CN Section 3
order: 33
icon: refresh
summary: 'Configure cluster backup and recovery in NKP using Velero, which backs up Kubernetes objects (stored as CRDs) and persistent volumes. Covers Velero CLI installation and use for backups/restores, NKP license tiers that support Backup & Restore, and object storage targets (integrated Rook Ceph or external S3-compatible stores such as Nutanix Objects).

  '
questions:
- id: q65
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What technology does NKP use for cluster backup and restore, and what does it back up?
  options:
  - id: a
    text: etcd snapshots only
  - id: b
    text: Velero — it backs up Kubernetes objects (NKP stores all data as CRDs) and persistent volumes
  - id: c
    text: rsync of the disks
  - id: d
    text: A custom NKP daemon
  correct: b
  explanation: NKP uses Velero to back up and restore Kubernetes clusters and persistent volumes; NKP stores all data as CRDs in the Kubernetes API, which Velero can back up and restore.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.554
    quote: NKP stores all data as CRDs in the Kubernetes API, and you can back it up and restore it.
- id: q66
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Is Velero included with NKP?
  options:
  - id: a
    text: No, install it separately
  - id: b
    text: Yes — NKP provides Velero by default to support backup and restore
  - id: c
    text: Only in the Ultimate license
  - id: d
    text: Only on AWS
  correct: b
  explanation: NKP provides Velero by default to support backup and restore operations for your clusters and persistent volumes.
  source:
    label: Velero Installation Using CLI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-velero-backup-c.html
    page: p.575
    quote: NKP provides Velero (https://velero.io/) by default, to support backup and restore operations for your Kubernetes clusters and persistent volumes.
- id: q67
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In which namespace is the Velero platform application installed in NKP, and what CLI setting is recommended?
  options:
  - id: a
    text: velero; no setting needed
  - id: b
    text: kommander; run velero client config set namespace=kommander so CLI commands use the right namespace
  - id: c
    text: default; set --namespace each time
  - id: d
    text: kube-system; no setting
  correct: b
  explanation: The Velero platform app is installed in the kommander namespace (not velero); set velero client config set namespace=kommander so CLI commands target the right namespace.
  source:
    label: Velero Installation Using CLI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-velero-backup-c.html
    page: p.575
    quote: In NKP, the Velero platform application is installed in the kommander namespace instead of velero... velero client config set namespace=kommander.
- id: q68
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which NKP license tiers include Backup & Restore (based on Velero)?
  options:
  - id: a
    text: All tiers including Starter
  - id: b
    text: Pro and Ultimate
  - id: c
    text: Ultimate only
  - id: d
    text: Starter only
  correct: b
  explanation: Backup & Restore (based on Velero) is available in the Pro and Ultimate tiers.
  source:
    label: NKP License Support for Backup & Restore
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nkp-license-c.html
    page: p.25
    quote: Backup & Restore based on Velero ... Pro, Ultimate.
- id: q69
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which components/services must be operational to restore a cluster with the Velero CLI?
  options:
  - id: a
    text: Only the API server
  - id: b
    text: The backend storage (Rook Ceph Cluster) is operational, the Velero platform service is operational, and Velero is set to restore-only-mode
  - id: c
    text: Only DNS
  - id: d
    text: No dependencies
  correct: b
  explanation: 'To restore: the Rook Ceph Cluster backend storage must be operational, the Velero platform service must be operational, and Velero must be set to restore-only-mode.'
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.578
    quote: The backend storage, Rook Ceph Cluster, is still operational.
- id: q70
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What are the two primary approaches NKP offers for Velero backup storage?
  options:
  - id: a
    text: NFS or local disk
  - id: b
    text: Integrated Rook Ceph (default), or External S3-compatible object storage (Nutanix Objects / cloud provider)
  - id: c
    text: Only Rook Ceph
  - id: d
    text: Only AWS S3
  correct: b
  explanation: NKP offers Integrated Rook Ceph (default) or External S3-compatible object storage (Nutanix Objects or a cloud provider).
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.554
    quote: For default installations, NKP deploys Velero integrated with Rook Ceph, operating within the same cluster.
- id: q71
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What storage does NKP recommend for production backups, and why?
  options:
  - id: a
    text: Rook Ceph, because it's built in
  - id: b
    text: An S3-compatible object store that resides outside the cluster (e.g., Nutanix Objects or AWS S3) for reliability
  - id: c
    text: Local hostPath volumes
  - id: d
    text: etcd
  correct: b
  explanation: For production, use an S3-compatible object store that resides outside the Kubernetes cluster (Nutanix Objects or AWS S3) for reliable external backup storage.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.554
    quote: For production use cases, use an S3-compatible object store that resides outside the Kubernetes cluster as the backup storage location for Velero.
- id: q72
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: Which prerequisites are required to use Nutanix Objects buckets for Velero? (Select all that apply)
  options:
  - id: a
    text: Velero is installed (default in NKP)
  - id: b
    text: The Velero CLI is installed
  - id: c
    text: An S3 bucket created with Nutanix Objects, with access configured
  - id: d
    text: A GPU node
  correct:
  - a
  - b
  - c
  explanation: 'Prerequisites: Velero is installed (default in NKP), the Velero CLI is installed, and an S3 bucket is created with Nutanix Objects with access configured.'
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.554
    quote: Velero is installed (included in the default NKP installation). Velero CLI is installed… You have created an S3 bucket with Nutanix Objects and configured access.
- id: q73
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: After applying the Ultimate license (which auto-deploys rook-ceph/velero), what must you do before using external Nutanix Objects storage?
  options:
  - id: a
    text: Nothing
  - id: b
    text: Disable rook-ceph, rook-ceph-cluster, and velero (delete them if already deployed) before proceeding
  - id: c
    text: Reinstall NKP
  - id: d
    text: Add a bastion host
  correct: b
  explanation: For management clusters, disable rook-ceph, rook-ceph-cluster, and velero right after applying the Ultimate license (which auto-deploys them); delete them if already deployed before proceeding.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.555
    quote: For NKP management clusters, disable rook-ceph, rook-ceph-cluster, and velero immediately after applying the Ultimate License because the license automatically deploys these components…
- id: q74
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What resource defines where Velero stores backups, and what is the per-cluster requirement?
  options:
  - id: a
    text: A PersistentVolume; shared by all clusters
  - id: b
    text: A BackupStorageLocation (BSL); each cluster must have its own bucket (AWS_PROFILE maps each secret to its BSL)
  - id: c
    text: A ConfigMap; one per namespace
  - id: d
    text: A Service; one per node
  correct: b
  explanation: Backups target a BackupStorageLocation (BSL); each cluster must have its own bucket, and the AWS_PROFILE field maps each secret to its BSL.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.556
    quote: Each cluster must have its own bucket. If you use different credentials to access the BackupStorageLocation (BSL), you can create multiple secrets… The AWS_PROFILE field maps each secret to its BSL.
- id: q75
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What are the NKP default backup settings?
  options:
  - id: a
    text: Weekly, one namespace
  - id: b
    text: Daily backups of all namespaces (taking effect after the cluster is created)
  - id: c
    text: Hourly, with volume snapshots
  - id: d
    text: Manual only
  correct: b
  explanation: By default NKP configures daily backups that save data from all namespaces, taking effect after the cluster is created.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.576
    quote: By default, NKP configures a regular, automatic backup… Create daily backups. Save the data from all namespaces.
- id: q76
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Do NKP default backups include volume snapshots?
  options:
  - id: a
    text: 'Yes'
  - id: b
    text: No — NKP default backups do not support the creation of Volume Snapshots
  - id: c
    text: Only on AWS
  - id: d
    text: Only for stateful apps
  correct: b
  explanation: NKP default backups do not support the creation of Volume Snapshots.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.576
    quote: 'Warning: NKP default backups do not support the creation of Volume Snapshots.'
- id: q77
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command creates an alternate backup schedule?
  options:
  - id: a
    text: kubectl create schedule
  - id: b
    text: velero create schedule <name> -n ${WORKSPACE_NAMESPACE} --snapshot-volumes=false --schedule="@every 8h"
  - id: c
    text: nkp backup schedule
  - id: d
    text: helm schedule
  correct: b
  explanation: Create an alternate schedule with velero create schedule <name> -n ${WORKSPACE_NAMESPACE} --snapshot-volumes=false --schedule="@every 8h".
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.576
    quote: velero create schedule <backup-schedule-name> -n ${WORKSPACE_NAMESPACE} --snapshot-volumes=false --schedule="@every 8h"
- id: q78
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you change the default backup service settings?
  options:
  - id: a
    text: Edit the pod
  - id: b
    text: velero get schedules; velero delete schedule velero-default; then velero create schedule velero-default with your settings (e.g., --schedule="@every 24h")
  - id: c
    text: Reinstall Velero
  - id: d
    text: It cannot be changed
  correct: b
  explanation: Change defaults by listing (velero get schedules), deleting velero-default (velero delete schedule velero-default), and recreating velero-default with your settings (e.g., @every 24h).
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.577
    quote: Delete the velero-default schedule. velero delete schedule velero-default.
- id: q79
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you schedule a backup for specific namespaces only?
  options:
  - id: a
    text: Not possible
  - id: b
    text: velero create schedule <name> --include-namespaces=kube-system,kommander --schedule="@every 24h"
  - id: c
    text: --exclude-all
  - id: d
    text: Use a separate cluster
  correct: b
  explanation: Scope a schedule to namespaces with --include-namespaces (e.g., velero create schedule <name> --include-namespaces=kube-system,kommander --schedule="@every 24h").
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.577
    quote: velero create schedule <backup-schedule-name> --include-namespaces=kube-system,kube-public,kommander --snapshot-volumes=false --schedule="@every 24h"
- id: q80
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: When should you take an on-demand backup?
  options:
  - id: a
    text: Never
  - id: b
    text: Before upgrading components or modifying cluster configuration (velero backup create <name>)
  - id: c
    text: Only after a failure
  - id: d
    text: Every hour automatically
  correct: b
  explanation: Take an on-demand backup before upgrading components or modifying cluster configuration, using velero backup create <name>.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.577
    quote: if you are preparing to upgrade any components or modify your cluster configuration, perform a backup before taking that action. velero backup create <backup-name>…
- id: q81
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Is the Velero CLI required, and what TLS consideration applies to the default setup?
  options:
  - id: a
    text: Required; no TLS
  - id: b
    text: Optional but beneficial; NKP sets Velero to use Rook Ceph over TLS with a self-signed cert, so you may need the --insecure-skip-tls-verify flag
  - id: c
    text: Required; uses plaintext
  - id: d
    text: Not available
  correct: b
  explanation: The Velero CLI is optional but beneficial. NKP sets Velero to use Rook Ceph over TLS with a self-signed cert, so some commands may require the --insecure-skip-tls-verify flag.
  source:
    label: Velero Installation Using CLI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-velero-backup-c.html
    page: p.575
    quote: By default, NKP sets up Velero to use Rook Ceph over TLS using a self-signed certificate… when using certain commands, you might be asked to use the --insecure-skip-tls-verify flag.
- id: q82
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command creates an on-demand backup?
  options:
  - id: a
    text: velero backup create <backup-name> -n ${WORKSPACE_NAMESPACE} --snapshot-volumes=false
  - id: b
    text: velero snapshot now
  - id: c
    text: kubectl backup
  - id: d
    text: nkp backup now
  correct: a
  explanation: Create an on-demand backup with velero backup create <backup-name> -n ${WORKSPACE_NAMESPACE} --snapshot-volumes=false.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.577
    quote: velero backup create <backup-name> -n ${WORKSPACE_NAMESPACE} --kubeconfig=${CLUSTER_NAME}.conf --snapshot-volumes=false
- id: q83
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which commands list existing backups, schedules, and restores?
  options:
  - id: a
    text: velero get backups / velero get schedules / velero get restores
  - id: b
    text: kubectl get backups only
  - id: c
    text: nkp list backups
  - id: d
    text: velero show all
  correct: a
  explanation: Use velero get backups / velero get schedules / velero get restores (also backup-locations and snapshot-locations) to list resources.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.579
    quote: velero get schedules / velero get backups / velero get restores / velero get backup-locations / velero get snapshot-locations
- id: q84
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command restores a cluster from a backup?
  options:
  - id: a
    text: velero restore create --from-backup <backup-name>
  - id: b
    text: velero apply backup
  - id: c
    text: kubectl restore
  - id: d
    text: nkp restore
  correct: a
  explanation: Restore with velero restore create --from-backup <backup-name>.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.579
    quote: 'Restore the cluster from the selected backup: velero restore create --from-backup'
- id: q85
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you verify a successful Velero deployment / values?
  options:
  - id: a
    text: helm get values -n kommander velero
  - id: b
    text: kubectl get velero
  - id: c
    text: nkp status velero
  - id: d
    text: velero doctor
  correct: a
  explanation: Verify Velero's deployment/values with helm get values -n kommander velero.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.578
    quote: '(Optional) Verify successful deployment of Velero: helm get values -n kommander velero.'
- id: q86
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you enable CSI volume snapshotting for Velero?
  options:
  - id: a
    text: It is always on
  - id: b
    text: velero client config set features=EnableCSI
  - id: c
    text: Edit the kubelet
  - id: d
    text: Install a plugin manually
  correct: b
  explanation: Enable CSI snapshotting with velero client config set features=EnableCSI.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.526
    quote: Configure Velero to use CSI snapshotting. velero client config set features=EnableCSI.
- id: q87
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What object must you configure so Velero can create a volume snapshot, and what label marks it?
  options:
  - id: a
    text: A PersistentVolumeClaim; no label
  - id: b
    text: 'A VolumeSnapshotClass with the label velero.io/csi-volumesnapshot-class: "true" (and the CSI driver, e.g., ebs.csi.aws.com)'
  - id: c
    text: A StorageClass; label snapshot=true
  - id: d
    text: A Secret; no label
  correct: b
  explanation: 'Configure a VolumeSnapshotClass with the label velero.io/csi-volumesnapshot-class: "true" (and the provider CSI driver, e.g., ebs.csi.aws.com) so Velero can create volume snapshots.'
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.525
    quote: 'kind: VolumeSnapshotClass … labels: velero.io/csi-volumesnapshot-class: "true" driver: ebs.csi.aws.com deletionPolicy: Delete'
- id: q88
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: If you need volume snapshots (persistent volume data), why can't you rely on the NKP default backup?
  options:
  - id: a
    text: The default is disabled
  - id: b
    text: Because NKP default backups do not create Volume Snapshots — you must configure a VolumeSnapshotClass / EnableCSI and set --snapshot-volumes accordingly
  - id: c
    text: Snapshots are unsupported
  - id: d
    text: It only backs up secrets
  correct: b
  explanation: NKP default backups don't create Volume Snapshots — to protect persistent-volume data you must configure a VolumeSnapshotClass / EnableCSI and set --snapshot-volumes accordingly.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.576
    quote: 'Warning: NKP default backups do not support the creation of Volume Snapshots.'
- id: q89
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you check whether the Velero service is currently running?
  options:
  - id: a
    text: ping velero
  - id: b
    text: kubectl get all -A | grep velero (or via the Kubernetes dashboard in the NKP UI)
  - id: c
    text: systemctl status velero
  - id: d
    text: nkp velero ps
  correct: b
  explanation: Check Velero with kubectl get all -A | grep velero, or via the Kubernetes dashboard in the NKP UI on the Management Cluster.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.579
    quote: 'You can check whether the Velero service is currently running… by running the following kubectl command: kubectl get all -A | grep velero.'
- id: q90
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which commands gather Velero diagnostic information about backups/restores/locations?
  options:
  - id: a
    text: velero get schedules / backups / restores / backup-locations / snapshot-locations
  - id: b
    text: kubectl top velero
  - id: c
    text: nkp diagnose velero
  - id: d
    text: velero debug all
  correct: a
  explanation: Gather diagnostics with velero get schedules / backups / restores / backup-locations / snapshot-locations.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.579
    quote: velero get schedules / velero get backups / velero get restores / velero get backup-locations / velero get snapshot-locations
- id: q91
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you inspect the details and logs of a specific backup?
  options:
  - id: a
    text: velero backup describe <name> and velero backup logs <name>
  - id: b
    text: kubectl describe backup only
  - id: c
    text: nkp logs backup
  - id: d
    text: cat /var/log/velero
  correct: a
  explanation: Inspect a backup with velero backup describe <name> and velero backup logs <name>.
  source:
    label: Backup Operations
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-operations-c.html
    page: p.577
    quote: you can check for more information using the commands `velero backup describe pre-expansion` and `velero backup logs pre-expansion`.
- id: q92
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: When restoring with the default Velero setup (no external object store), describe/logs may error. How do you still confirm success?
  options:
  - id: a
    text: You cannot
  - id: b
    text: Confirm the restore Phase is Completed and view logs with kubectl logs -l name=velero -n kommander --tail -1
  - id: c
    text: Reboot the node
  - id: d
    text: Re-run the backup
  correct: b
  explanation: With the default setup (no external object store), describe/logs can error; confirm the restore Phase is Completed and view logs with kubectl logs -l name=velero -n kommander --tail -1.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.579
