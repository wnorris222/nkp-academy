- id: q96
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What compatibility rule must be satisfied when restoring a backup?
  options:
  - id: a
    text: Any backup works anywhere
  - id: b
    text: The backup must be from the same NKP version and the same cluster — otherwise the result is an inoperable cluster
  - id: c
    text: Only the same license tier
  - id: d
    text: Only the same region
  correct: b
  explanation: The backup must be created from the same NKP version and the same cluster; restoring from an older version or another cluster results in an inoperable cluster.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.578
    quote: ensure that the backup was created from the same NKP version and from the same cluster. Restoring a backup from an older version or from another cluster results in an inoperable cluster.
