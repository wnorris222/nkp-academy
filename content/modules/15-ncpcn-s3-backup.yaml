id: ncpcn-s3-backup
title: 3.3 Backup & Recovery
track: NCP-CN Section 3
order: 33
icon: refresh
summary: 'Configure cluster backup and recovery in NKP using Velero, which backs up Kubernetes objects (stored as CRDs) and persistent volumes. Covers Velero CLI installation and use for backups/restores, NKP license tiers that support Backup & Restore, and object storage targets (integrated Rook Ceph or external S3-compatible stores such as Nutanix Objects).

  '
questions:
- id: q65
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What technology does NKP use for cluster backup and restore, and what does it back up?
  options:
  - id: a
    text: etcd snapshots only
  - id: b
    text: Velero — it backs up Kubernetes objects (NKP stores all data as CRDs) and persistent volumes
  - id: c
    text: rsync of the disks
  - id: d
    text: A custom NKP daemon
  correct: b
  explanation: NKP uses Velero to back up and restore Kubernetes clusters and persistent volumes; NKP stores all data as CRDs in the Kubernetes API, which Velero can back up and restore.
  source:
    label: Velero Configuration (Backup and Restore)
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-backup-and-restore-c.html
    page: p.554
    quote: NKP stores all data as CRDs in the Kubernetes API, and you can back it up and restore it.
- id: q66
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Is Velero included with NKP?
  options:
  - id: a
    text: No, install it separately
  - id: b
    text: Yes — NKP provides Velero by default to support backup and restore
  - id: c
    text: Only in the Ultimate license
  - id: d
    text: Only on AWS
  correct: b
  explanation: NKP provides Velero by default to support backup and restore operations for your clusters and persistent volumes.
  source:
    label: Velero Installation Using CLI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-velero-backup-c.html
    page: p.575
    quote: NKP provides Velero (https://velero.io/) by default, to support backup and restore operations for your Kubernetes clusters and persistent volumes.
- id: q67
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In which namespace is the Velero platform application installed in NKP, and what CLI setting is recommended?
  options:
  - id: a
    text: velero; no setting needed
  - id: b
    text: kommander; run velero client config set namespace=kommander so CLI commands use the right namespace
  - id: c
    text: default; set --namespace each time
  - id: d
    text: kube-system; no setting
  correct: b
  explanation: The Velero platform app is installed in the kommander namespace (not velero); set velero client config set namespace=kommander so CLI commands target the right namespace.
  source:
    label: Velero Installation Using the CLI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-velero-installation-using-cli-c.html
    page: ''
    quote: In NKP, the Velero platform application is installed in the kommander namespace instead of velero... velero client config set namespace=kommander.
- id: q69
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which components/services must be operational to restore a cluster with the Velero CLI?
  options:
  - id: a
    text: Only the API server
  - id: b
    text: The backend storage (Rook Ceph Cluster) is operational, the Velero platform service is operational, and Velero is set to restore-only-mode
  - id: c
    text: Only DNS
  - id: d
    text: No dependencies
  correct: b
  explanation: 'To restore: the Rook Ceph Cluster backend storage must be operational, the Velero platform service must be operational, and Velero must be set to restore-only-mode.'
  source:
    label: Restore a Cluster from Backup
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-restore-a-cluster-from-backup-t.html
    page: ''
    quote: The backend storage, Rook Ceph Cluster, is still operational.
- id: q70
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What are the two primary approaches NKP offers for Velero backup storage?
  options:
  - id: a
    text: NFS or local disk
  - id: b
    text: Integrated Rook Ceph (default), or External S3-compatible object storage (Nutanix Objects / cloud provider)
  - id: c
    text: Only Rook Ceph
  - id: d
    text: Only AWS S3
  correct: b
  explanation: NKP offers Integrated Rook Ceph (default) or External S3-compatible object storage (Nutanix Objects or a cloud provider).
  source:
    label: Velero Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-velero-config-c.html
    page: ''
    quote: For default installations, NKP deploys Velero integrated with Rook Ceph, operating within the same cluster.
- id: q71
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What storage does NKP recommend for production backups, and why?
  options:
  - id: a
    text: Rook Ceph, because it's built in
  - id: b
    text: An S3-compatible object store that resides outside the cluster (e.g., Nutanix Objects or AWS S3) for reliability
  - id: c
    text: Local hostPath volumes
  - id: d
    text: etcd
  correct: b
  explanation: For production, use an S3-compatible object store that resides outside the Kubernetes cluster (Nutanix Objects or AWS S3) for reliable external backup storage.
  source:
    label: Velero Configuration
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-velero-config-c.html
    page: ''
    quote: For production use cases, use an S3-compatible object store that resides outside the Kubernetes cluster as the backup storage location for Velero.
- id: q72
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: Which prerequisites are required to use Nutanix Objects buckets for Velero? (Select all that apply)
  options:
  - id: a
    text: Velero is installed (default in NKP)
  - id: b
    text: The Velero CLI is installed
  - id: c
    text: An S3 bucket created with Nutanix Objects, with access configured
  - id: d
    text: A GPU node
  correct:
  - a
  - b
  - c
  explanation: 'Prerequisites: Velero is installed (default in NKP), the Velero CLI is installed, and an S3 bucket is created with Nutanix Objects with access configured.'
  source:
    label: 'Velero with Nutanix Objects — Prepare the Environment'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-velero-with-nutanix-prep-environment-t.html
    page: ''
    quote: Velero is installed (included in the default NKP installation). Velero CLI is installed… You have created an S3 bucket with Nutanix Objects and configured access.
- id: q74
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What resource defines where Velero stores backups, and what is the per-cluster requirement?
  options:
  - id: a
    text: A PersistentVolume; shared by all clusters
  - id: b
    text: A BackupStorageLocation (BSL); each cluster must have its own bucket (AWS_PROFILE maps each secret to its BSL)
  - id: c
    text: A ConfigMap; one per namespace
  - id: d
    text: A Service; one per node
  correct: b
  explanation: Backups target a BackupStorageLocation (BSL); each cluster must have its own bucket, and the AWS_PROFILE field maps each secret to its BSL.
  source:
    label: 'Velero with Nutanix Objects — Prepare the Environment'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-velero-with-nutanix-prep-environment-t.html
    page: ''
    quote: Each cluster must have its own bucket. If you use different credentials to access the BackupStorageLocation (BSL), you can create multiple secrets… The AWS_PROFILE field maps each secret to its BSL.
- id: q77
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command creates an alternate backup schedule?
  options:
  - id: a
    text: kubectl create schedule
  - id: b
    text: velero create schedule <name> -n ${WORKSPACE_NAMESPACE} --snapshot-volumes=false --schedule="@every 8h"
  - id: c
    text: nkp backup schedule
  - id: d
    text: helm schedule
  correct: b
  explanation: Create an alternate schedule with velero create schedule <name> -n ${WORKSPACE_NAMESPACE} --snapshot-volumes=false --schedule="@every 8h".
  source:
    label: Create Backup Schedules
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-create-backup-schedules-t.html
    page: ''
    quote: velero create schedule <backup-schedule-name> -n ${WORKSPACE_NAMESPACE} --snapshot-volumes=false --schedule="@every 8h"
- id: q79
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you schedule a backup for specific namespaces only?
  options:
  - id: a
    text: Not possible
  - id: b
    text: velero create schedule <name> --include-namespaces=kube-system,kommander --schedule="@every 24h"
  - id: c
    text: --exclude-all
  - id: d
    text: Use a separate cluster
  correct: b
  explanation: Scope a schedule to namespaces with --include-namespaces (e.g., velero create schedule <name> --include-namespaces=kube-system,kommander --schedule="@every 24h").
  source:
    label: Create a Backup Schedule for Specific Namespaces
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-create-a-backup-schedule-for-specific-namespace-t.html
    page: ''
    quote: velero create schedule <backup-schedule-name> --include-namespaces=kube-system,kube-public,kommander --snapshot-volumes=false --schedule="@every 24h"
- id: q80
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: When should you take an on-demand backup?
  options:
  - id: a
    text: Never
  - id: b
    text: Before upgrading components or modifying cluster configuration (velero backup create <name>)
  - id: c
    text: Only after a failure
  - id: d
    text: Every hour automatically
  correct: b
  explanation: Take an on-demand backup before upgrading components or modifying cluster configuration, using velero backup create <name>.
  source:
    label: Back Up On Demand
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-back-up-on-demand-t.html
    page: ''
    quote: if you are preparing to upgrade any components or modify your cluster configuration, perform a backup before taking that action. velero backup create <backup-name>…
- id: q83
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which commands list existing backups, schedules, and restores?
  options:
  - id: a
    text: velero get backups / velero get schedules / velero get restores
  - id: b
    text: kubectl get backups only
  - id: c
    text: nkp list backups
  - id: d
    text: velero show all
  correct: a
  explanation: Use velero get backups / velero get schedules / velero get restores (also backup-locations and snapshot-locations) to list resources.
  source:
    label: Backup Service Diagnostics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-backup-service-diagnostics-c.html
    page: ''
    quote: velero get schedules / velero get backups / velero get restores / velero get backup-locations / velero get snapshot-locations
- id: q84
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command restores a cluster from a backup?
  options:
  - id: a
    text: velero restore create --from-backup <backup-name>
  - id: b
    text: velero apply backup
  - id: c
    text: kubectl restore
  - id: d
    text: nkp restore
  correct: a
  explanation: Restore with velero restore create --from-backup <backup-name>.
  source:
    label: Restore a Cluster from Backup
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-restore-a-cluster-from-backup-t.html
    page: ''
    quote: 'Restore the cluster from the selected backup: velero restore create --from-backup'
- id: q89
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you check whether the Velero service is currently running?
  options:
  - id: a
    text: ping velero
  - id: b
    text: kubectl get all -A | grep velero (or via the Kubernetes dashboard in the NKP UI)
  - id: c
    text: systemctl status velero
  - id: d
    text: nkp velero ps
  correct: b
  explanation: Check Velero with kubectl get all -A | grep velero, or via the Kubernetes dashboard in the NKP UI on the Management Cluster.
  source:
    label: Backup Service Diagnostics
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-backup-service-diagnostics-c.html
    page: ''
    quote: 'You can check whether the Velero service is currently running… by running the following kubectl command: kubectl get all -A | grep velero.'
