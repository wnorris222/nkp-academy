id: ncpcn-s1-registry
title: 1.1 Seed a Private Registry
track: NCP-CN Section 1
order: 11
icon: book
summary: 'Objective 1.1 covers seeding a local/private registry for air-gapped NKP deployments: why the registry must be pre-loaded, the nkp push bundle command and its parameters (REGISTRY_URL, REGISTRY_CA, credentials), the extraction and push workflow, network reachability requirements, and troubleshooting seeding issues for Harbor, JFrog, Nexus, and ECR registries.

  '
questions:
- id: q1
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In an air-gapped NKP deployment, what is the primary reason you must seed a local registry before creating the cluster?
  options:
  - id: a
    text: To license the NKP binary
  - id: b
    text: To load all required container images locally so cluster nodes can pull them without internet access
  - id: c
    text: To generate SSH keys for the bastion host
  - id: d
    text: To configure MetalLB load balancing
  correct: b
  explanation: Before creating an air-gapped cluster you must load required images into a local registry so the Konvoy (and Kommander) components can pull them without internet.
  source:
    label: Seeding the Registry for an Air-gapped Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-air-gap-seed-reg-t.html
    page: p.1031
    quote: Before creating an air-gapped Kubernetes cluster, you must load the required images in a local registry for the Konvoy component.
- id: q2
  type: true_false
  difficulty: core
  points: 10
  prompt: 'True/False: The NKP air-gapped bundle can only be used in a fully air-gapped environment.'
  options:
  - id: 'true'
    text: 'True'
  - id: 'false'
    text: 'False'
  correct: 'false'
  explanation: The complete air-gapped bundle is needed for air-gapped installs but can also be used to serve a local registry in a non-air-gapped environment.
  source:
    label: 'Nutanix Air-gapped: Loading the Registry'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-load-reg-t.html
    page: p.92
    quote: The complete NKP air-gapped bundle is needed for an air-gapped environment but can also be used in a non-air-gapped environment.
- id: q4
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: A partner asks why they can't just point an air-gapped cluster at Docker Hub "since it's only sometimes offline." Which statement best explains the requirement?
  options:
  - id: a
    text: Air-gapped clusters allow outbound but not inbound traffic, so Docker Hub works intermittently
  - id: b
    text: Air-gapped environments need local repositories (e.g., JFrog, Harbor, Nexus) to store images, charts, and artifacts because there's no reliable internet path
  - id: c
    text: Docker Hub is not a supported upstream for NKP
  - id: d
    text: Seeding is optional if the cluster has a bastion host
  correct: b
  explanation: Air-gapped environments need local repositories (JFrog, Harbor, Nexus) for images, charts, and artifacts — there is no reliable internet path.
  source:
    label: Air-gapped vs. Non-air-gapped Environments
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-reg-mt-ag-vs-non-ag-env-c.html
    page: p.24
    quote: in an air-gapped environment, you need local repositories to store Helm charts, docker images, and other artifacts. Tools such as JFrog, Harbor, and Nexus…
- id: q5
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: 'Fill in the blank. The command used to seed the air-gapped image bundle into a private registry is: nkp ______ ______ --bundle ./container-images/konvoy-image-bundle-nkp-version.tar --to-registry=${REGISTRY_URL} ...'
  options:
  - id: a
    text: push bundle
  - id: b
    text: load images
  - id: c
    text: seed registry
  - id: d
    text: upload bundle
  correct: a
  explanation: The seeding command is nkp push bundle, pointing --bundle at the konvoy image tar and --to-registry at the registry URL.
  source:
    label: Seeding the Registry for an Air-gapped Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-air-gap-seed-reg-t.html
    page: p.1031
    quote: nkp push bundle --bundle ./container-images/konvoy-image-bundle-nkp-version.tar --to-registry=${REGISTRY_URL}
- id: q6
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: Which flags authenticate the nkp push bundle command against a private registry that requires credentials? (Select two)
  options:
  - id: a
    text: --to-registry-username
  - id: b
    text: --registry-login
  - id: c
    text: --to-registry-password
  - id: d
    text: --auth-token
  correct:
  - a
  - c
  explanation: Authentication uses --to-registry-username and --to-registry-password (paired with --to-registry).
  source:
    label: 'Nutanix Air-gapped: Loading the Registry'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-load-reg-t.html
    page: p.93
    quote: --to-registry-username=${REGISTRY_USERNAME} --to-registry-password=${REGISTRY_PASSWORD}
- id: q8
  type: true_false
  difficulty: core
  points: 10
  prompt: 'True/False: REGISTRY_CA is always required when seeding a private registry.'
  options:
  - id: 'true'
    text: 'True'
  - id: 'false'
    text: 'False'
  correct: 'false'
  explanation: REGISTRY_CA is optional — needed only when the registry uses a self-signed cert the nodes/AMIs don't already trust.
  source:
    label: 'Nutanix Air-gapped: Loading the Registry'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-load-reg-t.html
    page: p.96
    quote: 'REGISTRY_CA: (optional)… This value is only needed if the registry is using a self-signed certificate and the AMIs are not already configured to trust this CA.'
- id: q9
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: A partner deploying to AWS wants to seed images into ECR instead of a self-hosted registry. Which two statements are correct? (Select two)
  options:
  - id: a
    text: Set REGISTRY_URL to the ECR registry URI
  - id: b
    text: You must always pass --to-registry-password with a static ECR password
  - id: c
    text: The environment running nkp push must be authenticated with AWS to load images into ECR
  - id: d
    text: ECR is unsupported for air-gapped seeding
  correct:
  - a
  - c
  explanation: Set REGISTRY_URL to the ECR URI and ensure the push environment is authenticated with AWS. No static ECR credentials are supplied.
  source:
    label: Seeding the Registry for an Air-gapped Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-air-gap-seed-reg-t.html
    page: p.1029
    quote: 'set an environment variable with your registry address for ECR: export REGISTRY_URL=<ecr-registry-URI>… The environment where you are running the NKP push command must be authenticated with AWS to load your images into ECR.'
- id: q11
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: 'Put the air-gapped registry-seeding workflow in the correct order: (1) cd nkp-nkp-version (2) export REGISTRY_URL=... and other registry variables (3) tar -xzvf nkp-air-gapped-bundle_...tar.gz (4) nkp push bundle ... konvoy-image-bundle ...'
  options:
  - id: a
    text: 3 -> 1 -> 2 -> 4
  - id: b
    text: 1 -> 2 -> 3 -> 4
  - id: c
    text: 3 -> 2 -> 1 -> 4
  - id: d
    text: 1 -> 3 -> 2 -> 4
  correct: a
  explanation: Extract the bundle, cd into the version directory, export the registry variables, then push the Konvoy bundle.
  source:
    label: Registry Mirror Tools
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-reg-mirror-tools-c.html
    page: p.1031
    quote: download the air-gapped bundle… extract the tarball… cd nkp-nkp-version… export REGISTRY_URL… nkp push bundle… konvoy-image-bundle…
- id: q12
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which bundle file must you download and extract to seed the registry?
  options:
  - id: a
    text: nkp_nkp-version_linux_amd64.tar.gz (CLI-only)
  - id: b
    text: nkp-air-gapped-bundle_nkp-version_linux_amd64.tar.gz
  - id: c
    text: konvoy-bootstrap-image.tar
  - id: d
    text: kommander-applications.tar
  correct: b
  explanation: The complete air-gapped bundle nkp-air-gapped-bundle_nkp-version_linux_amd64.tar.gz is downloaded and extracted to seed the registry.
  source:
    label: NKP Prerequisites
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-nkp-prerequisites-c.html
    page: p.50
    quote: 'Ensure to download the complete NKP air-gapped bundle: nkp-air-gapped-bundle_nkp-version_linux_amd64.tar.gz'
- id: q13
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: After extraction, in which subdirectory do the konvoy-image-bundle, kommander-image-bundle, and nkp-insights-image-bundle .tar files live?
  options:
  - id: a
    text: application-charts/
  - id: b
    text: application-repositories/
  - id: c
    text: container-images/
  - id: d
    text: nib/
  correct: c
  explanation: The image bundles live under container-images/ in the extracted directory tree.
  source:
    label: Seeding the Registry for an Air-gapped Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-air-gap-seed-reg-t.html
    page: p.1032
    quote: container-images / … konvoy-image-bundle… kommander-image-bundle… nkp-insights-image-bundle…
- id: q19
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: A partner reports nkp push bundle is running for a very long time with no error. What is the most likely, benign explanation per the docs?
  options:
  - id: a
    text: The registry is down
  - id: b
    text: Pushing all images takes time depending on network performance between the push machine and the registry
  - id: c
    text: The bundle version doesn't match the CLI
  - id: d
    text: REGISTRY_CA is missing
  correct: b
  explanation: Long push times are expected and depend on network performance between the push machine and the registry.
  source:
    label: Registry Mirror Tools
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-reg-mirror-tools-c.html
    page: p.1032
    quote: NKP takes some time to push all the images to your image registry, depending on the performance of the network between the machine you are running the script on and the registry.
- id: q21
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: For an air-gapped cluster, from which machines must the seeded registry be network-accessible? (Select all that apply)
  options:
  - id: a
    text: The bastion host
  - id: b
    text: The cluster nodes (EC2 instances or other machines created for the cluster)
  - id: c
    text: Docker Hub
  - id: d
    text: GitHub
  correct:
  - a
  - b
  explanation: The registry must be network-accessible from the bastion host and the cluster nodes. Docker Hub/GitHub are not reachable in air-gapped.
  source:
    label: Registry Mirror Tools
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-reg-mirror-tools-c.html
    page: p.1031
    quote: accessible from both the… Bastion Host… and either the Amazon EC2 instances… or other machines…
- id: q22
  type: true_false
  difficulty: core
  points: 10
  prompt: 'True/False: A network-restricted cluster is the same as an air-gapped cluster.'
  options:
  - id: 'true'
    text: 'True'
  - id: 'false'
    text: 'False'
  correct: 'false'
  explanation: A network-restricted cluster is explicitly not the same as an air-gapped cluster.
  source:
    label: Network-Restricted Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-network-restricted-cluster-c.html
    page: p.21
    quote: A network-restricted cluster is not the same as an air-gapped cluster.
- id: q23
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which statement correctly distinguishes the two?
  options:
  - id: a
    text: Network-restricted clusters block all ingress and egress; air-gapped allow egress
  - id: b
    text: Network-restricted clusters restrict but permit some controlled traffic; air-gapped clusters do not allow ingress or egress
  - id: c
    text: They are identical in traffic behavior
  - id: d
    text: Air-gapped clusters require internet; network-restricted do not
  correct: b
  explanation: Network-restricted clusters can reach external networks but aren't reachable from outside; air-gapped clusters allow no ingress or egress.
  source:
    label: Network-Restricted Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-network-restricted-cluster-c.html
    page: p.21
    quote: network-restricted clusters can reach external networks (like the Internet), but their services or ingresses cannot be accessed from outside. Air-gapped clusters, however, do not allow ingress or egress traffic.
- id: q24
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In an air-gapped deployment, what role does the bastion host play relative to the registry?
  options:
  - id: a
    text: It replaces the need for a registry
  - id: b
    text: It acts as a secure gateway with access to the infra provider's API and hosts/accesses the registry and NKP bundles
  - id: c
    text: It stores SSH keys only
  - id: d
    text: It runs the Kommander UI
  correct: b
  explanation: The bastion is a secure gateway with access to the infra provider's API; it hosts/accesses the Konvoy bundles, images, and local registry.
  source:
    label: Bastion Host
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-reg-mt-bastion-c.html
    page: p.1030
    quote: the bastion Virtual Machine (VM) hosts the installation of the… Konvoy bundles, images, and the Docker or other local registry… must have access to the infrastructure provider's… API.
