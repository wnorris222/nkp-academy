  type: multiple_choice
  difficulty: core
  points: 10
  prompt: When configuring an app's overrides, what do the configuration values correspond to?
  options:
  - id: a
    text: Node labels
  - id: b
    text: The application's Helm Chart values (applied via a config override / AppDeployment patch)
