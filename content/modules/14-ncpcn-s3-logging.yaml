id: ncpcn-s3-logging
title: 3.2 Configure Logging
track: NCP-CN Section 3
order: 32
icon: book
summary: 'NKP ships a pre-configured logging stack built on Grafana Loki, Fluent Bit and Fluentd, orchestrated by the BanzaiCloud Logging operator via Kubernetes custom resources. This objective covers enabling workspace and multi-tenant logging, customizing the stack with config overrides, scaling its components, and persisting log data to S3-compatible object storage such as Nutanix Objects or Rook Ceph.

  '
questions:
- id: q34
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What are the primary components of the NKP logging stack?
  options:
  - id: a
    text: Elasticsearch, Kibana, Logstash
  - id: b
    text: BanzaiCloud Logging-operator, Grafana + Grafana Loki, and Fluent Bit + Fluentd
  - id: c
    text: Splunk and Fluentd
  - id: d
    text: Prometheus and Alertmanager
  correct: b
  explanation: The primary components are the BanzaiCloud Logging-operator, Grafana and Grafana Loki, and Fluent Bit and Fluentd.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.589
    quote: 'The primary components of the logging stack include these platform services: BanzaiCloud Logging-operator; Grafana and Grafana Loki; Fluent Bit and Fluentd.'
- id: q35
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How does log data flow through the stack?
  options:
  - id: a
    text: Loki -> Fluentd -> Fluent Bit
  - id: b
    text: Fluent Bit gathers pod logs and sends them to Fluentd, which forwards to the appropriate Grafana Loki servers per custom-resource config
  - id: c
    text: Grafana collects logs directly
  - id: d
    text: Nodes push logs to Grafana
  correct: b
  explanation: Fluent Bit gathers pod-log data and sends it to Fluentd, which forwards it to the appropriate Grafana Loki servers based on custom-resource configuration.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.590
    quote: NKP uses the BanzaiCloud Logging operator to manage the Fluent Bit and Fluentd deployments that collect pod logs using Kubernetes API extensions called custom resources.
- id: q36
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How does Loki store and index log data?
  options:
  - id: a
    text: It indexes the full log messages
  - id: b
    text: It indexes log data by label and stores it for querying, but does not index the messages themselves (improving efficiency)
  - id: c
    text: It stores logs in etcd
  - id: d
    text: It does not store logs
  correct: b
  explanation: Loki indexes log data by label and stores it for querying, but does not index the log messages themselves, improving efficiency and lowering its footprint.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.590
    quote: Loki then indexes the log data by label and stores it for querying. Loki maintains log order integrity but does not index the log messages themselves...
- id: q38
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: By default, what is the logging state on managed and attached clusters?
  options:
  - id: a
    text: Enabled
  - id: b
    text: Disabled — you must explicitly enable the logging stack applications on the workspace
  - id: c
    text: Partially enabled
  - id: d
    text: Enabled only for admin logs
  correct: b
  explanation: Logging is disabled by default on managed and attached clusters; you must explicitly enable the logging stack applications on the workspace.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.589
    quote: By default, logging is disabled on managed and attached clusters. You need to enable the logging stack applications explicitly on the workspace...
- id: q39
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What prerequisite must be met on each attached cluster for successful Loki deployment?
  options:
  - id: a
    text: A GPU
  - id: b
    text: A default storage class set on each attached cluster
  - id: c
    text: An external load balancer
  - id: d
    text: FIPS mode
  correct: b
  explanation: Set a default storage class on each attached cluster for successful Loki deployment.
  source:
    label: Enable Logging Applications Using the UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-enable-logging_apps-using-ui-t.html
    page: ''
    quote: Set a default storage class on each attached cluster for successful Loki deployment.
- id: q40
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you enable Workspace-level logging via the UI?
  options:
  - id: a
    text: Edit etcd
  - id: b
    text: In the target workspace > Applications, enable Rook Ceph, Rook Ceph Cluster, Grafana Loki, Logging Operator, and Grafana Logging
  - id: c
    text: Restart the cluster
  - id: d
    text: Apply a license
  correct: b
  explanation: In the target workspace > Applications, enable Rook Ceph and Rook Ceph Cluster, then Grafana Loki, Logging Operator, and Grafana Logging.
  source:
    label: Enable Logging Applications Using the UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-enable-logging_apps-using-ui-t.html
    page: ''
    quote: Select the three-dot button... for Rook Ceph and Rook Ceph Cluster, then click Enable... Repeat the process for the Grafana Loki, Logging Operator, and Grafana Logging applications.
- id: q42
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Why does the documentation warn against enabling Fluent Bit (admin logs) without sufficient Ceph storage?
  options:
  - id: a
    text: It disables the UI
  - id: b
    text: Admin logs can use around 2 GB/day per node, requiring additional disk on the rook-ceph-cluster
  - id: c
    text: It breaks RBAC
  - id: d
    text: It is unsupported
  correct: b
  explanation: Fluent Bit collects admin logs, which can consume around 2 GB/day per node; enable it only after configuring the Grafana Loki Ceph bucket with sufficient storage.
  source:
    label: Create AppDeployments to Enable Workspace Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-create-appdeployments-to-enable-workspace-logging-t.html
    page: ''
    quote: We do not recommend installing Fluent Bit, which is responsible for collecting admin logs, unless you have configured the Grafana Loki Ceph Cluster Bucket with sufficient storage space… around 2GB/day per node.
- id: q45
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Where can you view the Logging Operator / Loki / Ceph dashboards?
  options:
  - id: a
    text: Only via CLI
  - id: b
    text: In the Grafana UI, when the Prometheus Monitoring (kube-prometheus-stack) platform app is enabled
  - id: c
    text: In Prism Central
  - id: d
    text: They are not available
  correct: b
  explanation: When the kube-prometheus-stack (Prometheus Monitoring) platform app is enabled, you can view the Logging Operator, Loki, and Ceph dashboards in the Grafana UI.
  source:
    label: 'Logging Stack — Logging Operator'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-logging-stack-logging-operator-c.html
    page: ''
    quote: In NKP, if the Prometheus Monitoring (kube-prometheus-stack) platform application is enabled, you can view the Logging Operator dashboard in the Grafana UI.
- id: q47
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the prerequisite for enabling multi-tenant (Project-level) logging?
  options:
  - id: a
    text: Nothing
  - id: b
    text: You must first enable Workspace-level logging
  - id: c
    text: An Ultimate license only
  - id: d
    text: A second cluster
  correct: b
  explanation: You must enable Workspace-level logging before you can configure multi-tenant (Project-level) logging.
  source:
    label: Multi-Tenant Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-multi-tenant-logging-c.html
    page: p.603
    quote: You must perform the Workspace-level Logging procedures as a prerequisite to enable multi-tenant logging at the Project level… Enable workspace-level logging before you can configure multi-tenant logging.
- id: q48
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How is multi-tenant log access isolated?
  options:
  - id: a
    text: By cluster only
  - id: b
    text: At the namespace level through Projects — each Project namespace has its own logging-operator Flow, Loki, and Grafana
  - id: c
    text: By node
  - id: d
    text: By IP address
  correct: b
  explanation: Multi-tenant log access is isolated at the namespace level through Projects — each Project namespace runs its own logging-operator Flow, Loki, and Grafana.
  source:
    label: Multi-Tenant Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-multi-tenant-logging-c.html
    page: p.602
    quote: Access to log data is done at the namespace level through the use of Projects... Each Project namespace has a logging-operator, 'Flow' that sends its pod logs to its own Loki server...
- id: q50
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you grant a team access to only their namespace's logs?
  options:
  - id: a
    text: Give them cluster-admin
  - id: b
    text: Assign teams to specific namespaces (via RBAC/Projects) so members see only the logs for the namespaces they own
  - id: c
    text: Share the admin token
  - id: d
    text: Disable RBAC
  correct: b
  explanation: Assign teams to specific namespaces (via RBAC/Projects); members then see only the logs for the namespaces they own.
  source:
    label: Multi-Tenant Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-multi-tenant-logging-c.html
    page: p.602
    quote: Assigning teams to specific namespaces enables the team members to see only the logs for the namespaces they own.
- id: q52
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which tool generates a support bundle (diagnostic data) to send to Nutanix for analysis?
  options:
  - id: a
    text: kubectl logs
  - id: b
    text: nkp diagnose (builds on the open-source troubleshoot.sh project)
  - id: c
    text: journalctl
  - id: d
    text: nkp gather-logs
  correct: b
  explanation: Use nkp diagnose to generate a support bundle; it builds on the open-source troubleshoot.sh project.
  source:
    label: Generate a Diagnostic Bundle
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-ts-gather-generate-diagnostic-bundle-c.html
    page: ''
    quote: nkp diagnose was developed by NKP and builds on the open source troubleshoot.sh project.
- id: q53
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How much history does the support bundle collect by default?
  options:
  - id: a
    text: 1 hour
  - id: b
    text: The last 48 hours of the cluster's life
  - id: c
    text: 7 days
  - id: d
    text: Everything since creation
  correct: b
  explanation: The support bundle collects data for the last 48 hours of the cluster's life by default.
  source:
    label: Generate a Support Bundle
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-ts-gather-generate-c.html
    page: ''
    quote: In order to generate a support bundle with data collected for the last 48 hours of the life of the cluster...
- id: q55
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What must be pre-installed/configured to use Nutanix Objects as the S3 store for an application?
  options:
  - id: a
    text: Nothing
  - id: b
    text: The COSI Driver for Nutanix application
  - id: c
    text: A second cluster
  - id: d
    text: An external load balancer
  correct: b
  explanation: To use Nutanix Objects as the S3 store, pre-install and configure the COSI Driver for Nutanix application.
  source:
    label: Configuring Loki to Use AWS S3 Storage in NKP
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-configure-loki-to-use-aws-s3-storage-in-nkp-t.html
    page: p.340
    quote: 'Nutanix Objects: You do not have to provide additional information after selecting Nutanix Objects. Note: Ensure that you pre-install and configure the COSI Driver for Nutanix application.'
- id: q59
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In a high-log-traffic environment, which component is typically the bottleneck?
  options:
  - id: a
    text: Grafana
  - id: b
    text: Fluentd (in the Logging Operator)
  - id: c
    text: Fluent Bit
  - id: d
    text: The API server
  correct: b
  explanation: In a high-log-traffic environment, Fluentd (in the Logging Operator) usually becomes the bottleneck.
  source:
    label: 'Logging Stack — Logging Operator'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-logging-stack-logging-operator-c.html
    page: ''
    quote: In a high log traffic environment, fluentd usually becomes the bottleneck of the logging stack.
