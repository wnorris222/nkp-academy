    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-ts-gather-generate-c.html
    page: ''
    quote: In order to generate a support bundle with data collected for the last 48 hours of the life of the cluster...
- id: q54
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which S3-compatible object storage options can NKP use for persisting log data?
  options:
  - id: a
    text: Only Rook Ceph
  - id: b
    text: Nutanix Objects (managed by the COSI Driver for Nutanix), external S3 (AWS/Azure/GCP/enterprise), or integrated Rook Ceph
  - id: c
    text: Only AWS S3
  - id: d
    text: Local disk only
  correct: b
  explanation: NKP can persist log data to Nutanix Objects (COSI Driver for Nutanix), external S3 providers (AWS/Azure/GCP/enterprise), or integrated Rook Ceph.
  source:
    label: Configuring Loki to Use AWS S3 Storage in NKP
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-configure-loki-to-use-aws-s3-storage-in-nkp-t.html
    page: p.340
    quote: 'Nutanix Objects: Nutanix Objects are well-integrated with Nutanix and managed by the COSI Driver for Nutanix... S3 storage from other providers such as AWS, Azure, GCP... Integrated Rook Ceph...'
- id: q55
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What must be pre-installed/configured to use Nutanix Objects as the S3 store for an application?
  options:
  - id: a
    text: Nothing
  - id: b
    text: The COSI Driver for Nutanix application
  - id: c
    text: A second cluster
  - id: d
    text: An external load balancer
  correct: b
  explanation: To use Nutanix Objects as the S3 store, pre-install and configure the COSI Driver for Nutanix application.
  source:
    label: Configuring Loki to Use AWS S3 Storage in NKP
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-configure-loki-to-use-aws-s3-storage-in-nkp-t.html
    page: p.340
    quote: 'Nutanix Objects: You do not have to provide additional information after selecting Nutanix Objects. Note: Ensure that you pre-install and configure the COSI Driver for Nutanix application.'
- id: q56
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: When configuring Loki to use S3 storage, how are the credentials supplied?
  options:
  - id: a
    text: Hard-coded in the pod
  - id: b
    text: As a Kubernetes Secret (e.g., AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) mounted into the Loki pods as environment variables
  - id: c
    text: Via kubeconfig
  - id: d
    text: In a plaintext file
  correct: b
  explanation: Create a Kubernetes Secret with AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY; it is mounted into the Grafana Loki pods as environment variables.
  source:
    label: Configuring Loki to Use AWS S3 Storage in NKP
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-configure-loki-to-use-aws-s3-storage-in-nkp-t.html
    page: p.612
    quote: Create a secret containing the static AWS S3 credentials. The secret is then mounted into each of the Grafana Loki pods as environment variables. kubectl create secret generic nkp-aws-s3-creds...
- id: q57
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you point Loki at your object storage endpoint/bucket?
  options:
  - id: a
    text: Edit the Loki binary
  - id: b
    text: Provide a grafana-loki-overrides ConfigMap setting loki.structuredConfig.storage_config.aws.s3, then patch the grafana-loki AppDeployment (configOverrides)
  - id: c
    text: It auto-detects
  - id: d
    text: Use a NodePort
  correct: b
  explanation: Provide a grafana-loki-overrides ConfigMap setting loki.structuredConfig.storage_config.aws.s3 (endpoint/bucket), then patch the grafana-loki AppDeployment to reference it (configOverrides).
  source:
    label: Configuring Loki to Use AWS S3 Storage in NKP
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-configure-loki-to-use-aws-s3-storage-in-nkp-t.html
    page: p.612
    quote: 'Create a config that overrides ConfigMap to update the storage configuration… name: grafana-loki-overrides… storage_config: aws: s3: s3://<region>/<bucket name>… Update the grafana-loki AppDeployment to apply the configuration override.'
- id: q58
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For production log storage, what does NKP recommend, and why?
  options:
  - id: a
    text: Always Rook Ceph
  - id: b
    text: Enterprise-grade S3 or Nutanix Object Storage — they provide better scalability and lifecycle management (Rook Ceph shares storage with internal apps)
  - id: c
    text: Local volumes
  - id: d
    text: No persistence
  correct: b
  explanation: For production, use enterprise-grade S3 or Nutanix Object Storage for better scalability and lifecycle management; Rook Ceph shares storage with internal apps.
  source:
    label: Configuring Loki to Use AWS S3 Storage in NKP
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-configure-loki-to-use-aws-s3-storage-in-nkp-t.html
    page: p.340
    quote: For production environments, choose either enterprise-grade S3 storage or Nutanix Object Storage, because these provide better scalability and lifecycle management.
- id: q59
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In a high-log-traffic environment, which component is typically the bottleneck?
  options:
  - id: a
    text: Grafana
  - id: b
    text: Fluentd (in the Logging Operator)
  - id: c
    text: Fluent Bit
  - id: d
    text: The API server
  correct: b
  explanation: In a high-log-traffic environment, Fluentd (in the Logging Operator) usually becomes the bottleneck.
  source:
    label: 'Logging Stack — Logging Operator'
