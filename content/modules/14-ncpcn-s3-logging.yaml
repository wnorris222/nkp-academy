id: ncpcn-s3-logging
title: 3.2 Configure Logging
track: NCP-CN Section 3
order: 32
icon: book
summary: 'NKP ships a pre-configured logging stack built on Grafana Loki, Fluent Bit and Fluentd, orchestrated by the BanzaiCloud Logging operator via Kubernetes custom resources. This objective covers enabling workspace and multi-tenant logging, customizing the stack with config overrides, scaling its components, and persisting log data to S3-compatible object storage such as Nutanix Objects or Rook Ceph.

  '
questions:
- id: q33
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What does NKP provide out of the box for logging?
  options:
  - id: a
    text: Nothing; you must build it
  - id: b
    text: A pre-configured logging stack that collects and visualizes pod and admin log data at the Workspace level (and is multi-tenant capable)
  - id: c
    text: Only node metrics
  - id: d
    text: Only audit logs
  correct: b
  explanation: NKP provides a pre-configured logging stack that collects and visualizes pod and admin log data at the Workspace level and is multi-tenant capable.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.589
    quote: NKP comes with a pre-configured logging stack that allows you to collect and visualize pod and admin log data at the Workspace level. The logging stack is also multi-tenant capable...
- id: q34
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What are the primary components of the NKP logging stack?
  options:
  - id: a
    text: Elasticsearch, Kibana, Logstash
  - id: b
    text: BanzaiCloud Logging-operator, Grafana + Grafana Loki, and Fluent Bit + Fluentd
  - id: c
    text: Splunk and Fluentd
  - id: d
    text: Prometheus and Alertmanager
  correct: b
  explanation: The primary components are the BanzaiCloud Logging-operator, Grafana and Grafana Loki, and Fluent Bit and Fluentd.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.589
    quote: 'The primary components of the logging stack include these platform services: BanzaiCloud Logging-operator; Grafana and Grafana Loki; Fluent Bit and Fluentd.'
- id: q35
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How does log data flow through the stack?
  options:
  - id: a
    text: Loki -> Fluentd -> Fluent Bit
  - id: b
    text: Fluent Bit gathers pod logs and sends them to Fluentd, which forwards to the appropriate Grafana Loki servers per custom-resource config
  - id: c
    text: Grafana collects logs directly
  - id: d
    text: Nodes push logs to Grafana
  correct: b
  explanation: Fluent Bit gathers pod-log data and sends it to Fluentd, which forwards it to the appropriate Grafana Loki servers based on custom-resource configuration.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.590
    quote: NKP uses the BanzaiCloud Logging operator to manage the Fluent Bit and Fluentd deployments that collect pod logs using Kubernetes API extensions called custom resources.
- id: q36
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How does Loki store and index log data?
  options:
  - id: a
    text: It indexes the full log messages
  - id: b
    text: It indexes log data by label and stores it for querying, but does not index the messages themselves (improving efficiency)
  - id: c
    text: It stores logs in etcd
  - id: d
    text: It does not store logs
  correct: b
  explanation: Loki indexes log data by label and stores it for querying, but does not index the log messages themselves, improving efficiency and lowering its footprint.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.590
    quote: Loki then indexes the log data by label and stores it for querying. Loki maintains log order integrity but does not index the log messages themselves...
- id: q37
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What manages the Fluent Bit and Fluentd deployments in NKP?
  options:
  - id: a
    text: A DaemonSet you write
  - id: b
    text: The BanzaiCloud Logging operator, via Kubernetes custom resources (declared with kubectl)
  - id: c
    text: Helm only
  - id: d
    text: The kubelet
  correct: b
  explanation: The BanzaiCloud Logging operator manages the Fluent Bit and Fluentd deployments via Kubernetes custom resources that you declare with kubectl.
  source:
    label: Logging Operator
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-operator-c.html
    page: p.590
    quote: NKP uses the BanzaiCloud Logging operator to manage the Fluent Bit and Fluentd deployments that collect pod logs using Kubernetes API extensions called custom resources.
- id: q38
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: By default, what is the logging state on managed and attached clusters?
  options:
  - id: a
    text: Enabled
  - id: b
    text: Disabled — you must explicitly enable the logging stack applications on the workspace
  - id: c
    text: Partially enabled
  - id: d
    text: Enabled only for admin logs
  correct: b
  explanation: Logging is disabled by default on managed and attached clusters; you must explicitly enable the logging stack applications on the workspace.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.589
    quote: By default, logging is disabled on managed and attached clusters. You need to enable the logging stack applications explicitly on the workspace...
- id: q39
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What prerequisite must be met on each attached cluster for successful Loki deployment?
  options:
  - id: a
    text: A GPU
  - id: b
    text: A default storage class set on each attached cluster
  - id: c
    text: An external load balancer
  - id: d
    text: FIPS mode
  correct: b
  explanation: Set a default storage class on each attached cluster for successful Loki deployment.
  source:
    label: Enable Logging Applications Using the UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-enable-logging_apps-using-ui-t.html
    page: ''
    quote: Set a default storage class on each attached cluster for successful Loki deployment.
- id: q40
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you enable Workspace-level logging via the UI?
  options:
  - id: a
    text: Edit etcd
  - id: b
    text: In the target workspace > Applications, enable Rook Ceph, Rook Ceph Cluster, Grafana Loki, Logging Operator, and Grafana Logging
  - id: c
    text: Restart the cluster
  - id: d
    text: Apply a license
  correct: b
  explanation: In the target workspace > Applications, enable Rook Ceph and Rook Ceph Cluster, then Grafana Loki, Logging Operator, and Grafana Logging.
  source:
