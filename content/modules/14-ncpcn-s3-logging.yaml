    page: ''
    quote: Select the three-dot button... for Rook Ceph and Rook Ceph Cluster, then click Enable... Repeat the process for the Grafana Loki, Logging Operator, and Grafana Logging applications.
- id: q41
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which CLI command creates the logging AppDeployments on the management cluster?
  options:
  - id: a
    text: kubectl create logging
  - id: b
    text: nkp create appdeployment logging-operator --app logging-operator-<ver> --workspace ${WORKSPACE_NAME} (and rook-ceph, grafana-loki, grafana-logging)
  - id: c
    text: helm install loki
  - id: d
    text: nkp enable logging
  correct: b
  explanation: Use nkp create appdeployment for logging-operator, rook-ceph, rook-ceph-cluster, grafana-loki, and grafana-logging with --workspace ${WORKSPACE_NAME}.
  source:
    label: Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-cluster-operations-c.html
    page: p.597
    quote: nkp create appdeployment logging-operator --app logging-operator-3.17.9 --workspace ${WORKSPACE_NAME} ... nkp create appdeployment rook-ceph --app rook-ceph-1.10.3 --workspace ${WORKSPACE_NAME}...
- id: q42
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Why does the documentation warn against enabling Fluent Bit (admin logs) without sufficient Ceph storage?
  options:
  - id: a
    text: It disables the UI
  - id: b
    text: Admin logs can use around 2 GB/day per node, requiring additional disk on the rook-ceph-cluster
  - id: c
    text: It breaks RBAC
  - id: d
    text: It is unsupported
  correct: b
  explanation: Fluent Bit collects admin logs, which can consume around 2 GB/day per node; enable it only after configuring the Grafana Loki Ceph bucket with sufficient storage.
  source:
    label: Create AppDeployments to Enable Workspace Logging
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-create-appdeployments-to-enable-workspace-logging-t.html
    page: ''
    quote: We do not recommend installing Fluent Bit, which is responsible for collecting admin logs, unless you have configured the Grafana Loki Ceph Cluster Bucket with sufficient storage space… around 2GB/day per node.
- id: q43
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you customize a logging stack application on an attached/managed cluster?
  options:
  - id: a
    text: Edit the pod directly
  - id: b
    text: Apply a ConfigMap (e.g., logging-operator-logging-overrides) to the cluster and reference it as a config override
  - id: c
    text: Reinstall NKP
  - id: d
    text: It cannot be customized
  correct: b
  explanation: Customize by applying a ConfigMap (e.g., logging-operator-logging-overrides) to the managed/attached cluster and referencing it as a config override.
  source:
    label: Customizing Logging Stack Applications
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-customize-logging-stack-apps-t.html
    page: p.613
    quote: Apply the ConfigMap directly to the managed/attached cluster using the name, logging-operator-logging-overrides.
- id: q44
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How large is the in-memory buffer Fluent Bit maintains, and how often does it flush?
  options:
  - id: a
    text: 50 MB, every 10s
  - id: b
    text: 5 MB in memory, flushed every one second (with a checkpoint per file so it resumes after restart)
  - id: c
    text: 1 GB, every minute
  - id: d
    text: No buffer
  correct: b
  explanation: Fluent Bit maintains a 5 MB in-memory buffer, flushes it every one second, and keeps a checkpoint per file so it resumes after a restart.
  source:
    label: Logging Operator
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-logging-operator-c.html
    page: p.590
    quote: Maintains a small buffer of logs (5 MB in memory)... Maintains a checkpoint on each host for each file it's consumed... Flushes the buffer every one second.
- id: q45
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Where can you view the Logging Operator / Loki / Ceph dashboards?
  options:
  - id: a
    text: Only via CLI
  - id: b
    text: In the Grafana UI, when the Prometheus Monitoring (kube-prometheus-stack) platform app is enabled
  - id: c
    text: In Prism Central
  - id: d
