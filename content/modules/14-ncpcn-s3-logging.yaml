  source:
    label: Customizing Logging Stack Applications
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-customize-logging-stack-apps-t.html
    page: p.613
    quote: Apply the ConfigMap directly to the managed/attached cluster... (config override referenced by the AppDeployment).
- id: q47
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the prerequisite for enabling multi-tenant (Project-level) logging?
  options:
  - id: a
    text: Nothing
  - id: b
    text: You must first enable Workspace-level logging
  - id: c
    text: An Ultimate license only
  - id: d
