- id: q128
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the rule regarding the Pod and Service subnets relative to node subnets?
  options:
  - id: a
    text: They must exactly match the node subnet
  - id: b
    text: They must not overlap with subnets used by cluster Nodes (nor with LoadBalancer virtual-IP subnets)
  - id: c
    text: They must be public IPs
  - id: d
    text: They are irrelevant
  correct: b
  explanation: Pod and Service subnets must not overlap with subnets used by cluster Nodes; where virtual IPs are allocated for LoadBalancer Services, they must not overlap those either.
  source:
    label: 'Pre-provisioned: Defining the Infrastructure'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-preprov-define-infra-t.html
    page: p.701
    quote: These subnets must not overlap with subnets used by cluster Nodes… the Pods and Services subnets must not overlap with the virtual IP subnets.
- id: q129
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: If the default Pod or Service subnets overlap with node subnets, when must you change them?
  options:
  - id: a
    text: Any time after deployment
  - id: b
    text: At cluster creation
  - id: c
    text: Only during upgrade
  - id: d
    text: They cannot be changed
  correct: b
  explanation: If the defaults overlap with node subnets, you must change the Pods or Services subnets at cluster creation.
  source:
    label: 'Pre-provisioned: Defining the Infrastructure'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-preprov-define-infra-t.html
    page: p.701
    quote: If the default Pods or Services subnets overlap with any subnets used by cluster Nodes, you must change the Pods or Services subnets. You must do this at cluster creation.
- id: q130
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For an on-prem / pre-provisioned control-plane endpoint, what are the two options?
  options:
  - id: a
    text: NodePort or Ingress
  - id: b
    text: An external load balancer, or a virtual IP (kube-vip) via --virtual-ip-interface
  - id: c
    text: Only a public IP
  - id: d
    text: DNS round-robin only
  correct: b
  explanation: On-prem/pre-provisioned control-plane endpoints use either an external load balancer or a virtual IP provided by kube-vip (--virtual-ip-interface).
  source:
    label: 'Pre-provisioned: Defining the Infrastructure'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-preprov-define-infra-t.html
    page: p.80
    quote: This command uses the default external load balancer (LB) option (see alternative Step 1 for virtual IP)… ALTERNATIVE Virtual IP - if you don't have an external LB… use a VIRTUAL IP provided by kube-vip
- id: q131
