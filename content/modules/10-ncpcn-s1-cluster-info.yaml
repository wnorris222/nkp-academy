- id: q143
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For local volume provisioning (persistent volumes), what must you mount on each machine?
  options:
  - id: a
    text: One volume of 40 GiB
  - id: b
    text: At least four volumes to /mnt/disks/, each with at least 100 GiB of capacity
  - id: c
