id: ncpcn-s1-cluster-info
title: 1.6 Gather Cluster Build Information
track: NCP-CN Section 1
order: 16
icon: star
summary: 'Objective 1.6 covers the information you must gather before building an NKP cluster on a target provider: networking requirements (control-plane endpoint and port, default Pod/Service subnets and their non-overlap rules), connectivity details for Prism Central (endpoint, port, credentials), storage requirements (Nutanix CSI, raw storage, local-volume mounts), node sizing per license tier, supported operating systems and CPU architecture, and provider-specific parameters for pre-provisioned, Nutanix, AKS, and Azure deployments.

  '
questions:
- id: q125
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the default control-plane endpoint port if not otherwise specified?
  options:
  - id: a
    text: '443'
  - id: b
    text: '9440'
  - id: c
    text: '6443'
  - id: d
    text: '8443'
  correct: c
  explanation: The control-plane endpoint port defaults to 6443 unless a different port is specified.
  source:
    label: Configuring CIDR Values for the Pod Network and Kubernetes Services
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-configure-cidr-values-for-pod-network-and-kubernetes-services-t.html
    page: ''
    quote: --control-plane-endpoint-port <control plane endpoint port, if different than 6443>
- id: q126
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the default Pod subnet CIDR used by NKP?
  options:
  - id: a
    text: 10.96.0.0/12
  - id: b
    text: 192.168.0.0/16
  - id: c
    text: 172.16.0.0/16
  - id: d
    text: 10.0.0.0/12
  correct: b
  explanation: The default Pod subnet in NKP is 192.168.0.0/16.
  source:
    label: Creating a Nutanix VM Image
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-create-image-t.html
    page: ''
    quote: 'The default subnets used in NKP are: … pods: cidrBlocks: - 192.168.0.0/16 … services: cidrBlocks: - 10.96.0.0/12'
- id: q127
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the default Service subnet CIDR used by NKP?
  options:
  - id: a
    text: 10.96.0.0/12
  - id: b
    text: 192.168.0.0/16
  - id: c
    text: 172.16.0.0/16
  - id: d
    text: 10.244.0.0/16
  correct: a
  explanation: The default Service subnet in NKP is 10.96.0.0/12.
  source:
    label: Creating a Nutanix VM Image
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-create-image-t.html
    page: ''
    quote: 'services: cidrBlocks: - 10.96.0.0/12'
- id: q128
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the rule regarding the Pod and Service subnets relative to node subnets?
  options:
  - id: a
    text: They must exactly match the node subnet
  - id: b
    text: They must not overlap with subnets used by cluster Nodes (nor with LoadBalancer virtual-IP subnets)
  - id: c
    text: They must be public IPs
  - id: d
    text: They are irrelevant
  correct: b
  explanation: Pod and Service subnets must not overlap with subnets used by cluster Nodes; where virtual IPs are allocated for LoadBalancer Services, they must not overlap those either.
  source:
    label: Subnets for Pods
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-subnets-pods-t.html
    page: ''
    quote: These subnets must not overlap with subnets used by cluster Nodes… the Pods and Services subnets must not overlap with the virtual IP subnets.
- id: q129
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: If the default Pod or Service subnets overlap with node subnets, when must you change them?
  options:
  - id: a
    text: Any time after deployment
  - id: b
    text: At cluster creation
  - id: c
    text: Only during upgrade
  - id: d
    text: They cannot be changed
  correct: b
  explanation: If the defaults overlap with node subnets, you must change the Pods or Services subnets at cluster creation.
  source:
    label: Subnets for Pods
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-subnets-pods-t.html
    page: ''
    quote: If the default Pods or Services subnets overlap with any subnets used by cluster Nodes, you must change the Pods or Services subnets. You must do this at cluster creation.
- id: q133
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the default Prism Central port?
  options:
  - id: a
    text: '6443'
  - id: b
    text: '443'
  - id: c
    text: '9440'
  - id: d
    text: '8443'
  correct: c
  explanation: The default Prism Central port is 9440.
  source:
    label: Creating a Nutanix VM Image
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-create-image-t.html
    page: ''
    quote: Replace Prism Central port with the custom port number for Prism Central. The default value is 9440.
- id: q134
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which variable/flag provides the Prism Central endpoint URL?
  options:
  - id: a
    text: NUTANIX_ENDPOINT (--endpoint)
  - id: b
    text: PC_HOST
  - id: c
    text: PRISM_URL
  - id: d
    text: CLUSTER_ENDPOINT
  correct: a
  explanation: NUTANIX_ENDPOINT (the --endpoint flag) provides the Prism Central endpoint URL; the NKP CLI uses the Prism Central API hosted there.
  source:
    label: Creating a Nutanix VM Image
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-create-image-t.html
    page: ''
    quote: export NUTANIX_ENDPOINT=URL of Prism Central Endpoint… The NKP CLI uses the Prism Central API to create the OS image, and this API is hosted at the Prism Central endpoint.
- id: q135
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which credentials are used to connect to Prism Central?
  options:
  - id: a
    text: AWS_ACCESS_KEY / SECRET
  - id: b
    text: NUTANIX_USER(NAME) and NUTANIX_PASSWORD
  - id: c
    text: SSH_USER / SSH_KEY
  - id: d
    text: kubeadmin token
  correct: b
  explanation: Connect to Prism Central with NUTANIX_USER(NAME) and NUTANIX_PASSWORD.
  source:
    label: Creating a Nutanix VM Image
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-create-image-t.html
    page: ''
    quote: 'Provide the Prism Central credentials: export NUTANIX_USER=Prism Central Username … export NUTANIX_PASSWORD=Prism Central Password'
- id: q137
  type: multiple_choice
  difficulty: advanced
  points: 15
  prompt: What are the operator/host requirements for building a cluster? (Select all that apply)
  options:
  - id: a
    text: x86_64-based Linux or macOS (cgroups v2 enabled on Linux)
  - id: b
    text: Docker 27.4.0 or Podman 4.0+ container runtime
  - id: c
    text: A container registry to store/manage images
  - id: d
    text: A Windows Server host
  correct:
  - a
  - b
  - c
  explanation: The host must be x86_64 Linux/macOS (cgroups v2 on Linux), have Docker 27.4.0 or Podman 4.0+, and have a container registry to store/manage images.
  source:
    label: Resource Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-resource-req-c.html
    page: ''
    quote: Your host must be a x86_64-based Linux or macOS machine… cgroups v2 is required… A Docker or Podman container runtime is required… Your environment must include a container registry…
- id: q141
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the default storage provider used by NKP?
  options:
  - id: a
    text: Longhorn
  - id: b
    text: The Nutanix Container Storage Interface (CSI) Volume Driver 3.0
  - id: c
    text: Local-path provisioner
  - id: d
    text: AWS EBS CSI
  correct: b
  explanation: NKP uses the Nutanix CSI Volume Driver 3.0 as the default storage provider.
  source:
    label: Default Storage Providers
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-default-storage-providers-c.html
    page: ''
    quote: NKP uses the Nutanix Container Storage Interface (CSI) Volume Driver 3.0 as the default storage provider.
- id: q142
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How much raw storage must you add to each worker node?
  options:
  - id: a
    text: At least 20 GB
  - id: b
    text: At least 40 GB of raw storage
  - id: c
    text: At least 100 GB
  - id: d
    text: None required
  correct: b
  explanation: Add at least 40 GB of raw storage to each of your cluster worker nodes.
  source:
    label: Resource Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-resource-req-c.html
    page: ''
    quote: Ensure that you add at least 40 GB of raw storage to each of your cluster worker nodes.
- id: q144
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What storage does the Nutanix CSI driver use?
  options:
  - id: a
    text: Local disk only
  - id: b
    text: The storage container associated with the Prism Central cluster
  - id: c
    text: An external NFS server
  - id: d
    text: S3 object storage
  correct: b
  explanation: The Nutanix CSI driver uses the storage container associated with the Prism Central cluster.
  source:
    label: Resource Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-resource-req-c.html
    page: ''
    quote: The Nutanix CSI driver uses the storage container associated with the Prism Central cluster.
- id: q147
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For production deployments, what is the minimum node count?
  options:
  - id: a
    text: 1 control plane and 1 worker
  - id: b
    text: At least 3 control plane nodes and a minimum of 4 worker nodes
  - id: c
    text: 3 control plane and 2 workers
  - id: d
    text: 5 control plane and 5 workers
  correct: b
  explanation: Production deployments need at least three control plane nodes and a minimum of four worker nodes.
  source:
    label: Resource Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-resource-req-c.html
    page: ''
    quote: For production deployments, you need at least three control plane nodes and a minimum of four worker nodes.
- id: q148
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For Pro and Ultimate clusters, what is the recommended control-plane node sizing (vCPU / memory)?
  options:
  - id: a
    text: 2 vCPU / 8 GiB
  - id: b
    text: 4 vCPU / 16 GiB
  - id: c
    text: 8 vCPU / 32 GiB
  - id: d
    text: 4 vCPU / 8 GiB
  correct: b
  explanation: Pro/Ultimate clusters recommend control-plane nodes at 4 vCPU and 16 GiB memory.
  source:
    label: Pro and Ultimate Cluster Minimum Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-resource-req-pro-and-ultimate-cluster-min-r.html
    page: ''
    quote: 'Table 67: General Resource Requirements for Pro and Ultimate Clusters — Control Plane Node: vCPU count 4, Memory 16 GiB.'
- id: q149
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For Pro and Ultimate clusters, what is the recommended worker node sizing (vCPU / memory)?
  options:
  - id: a
    text: 4 vCPU / 16 GiB
  - id: b
    text: 8 vCPU / 32 GiB
  - id: c
    text: 2 vCPU / 8 GiB
  - id: d
    text: 8 vCPU / 16 GiB
  correct: b
  explanation: Pro/Ultimate clusters recommend worker nodes at 8 vCPU and 32 GiB memory.
  source:
    label: Pro and Ultimate Cluster Minimum Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-resource-req-pro-and-ultimate-cluster-min-r.html
    page: ''
    quote: 'Table 67 — Worker Node: vCPU count 8, Memory 32 GiB.'
- id: q150
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For a Starter management cluster, what are the control-plane and worker node minimums (vCPU/memory)?
  options:
  - id: a
    text: CP 2 vCPU / 8 GiB, Worker 4 vCPU / 8 GiB (3 control plane, 2 workers)
  - id: b
    text: CP 4 vCPU / 16 GiB, Worker 8 vCPU / 32 GiB
  - id: c
    text: CP 1 vCPU / 4 GiB, Worker 2 vCPU / 4 GiB
  - id: d
    text: CP 8 vCPU / 32 GiB, Worker 8 vCPU / 32 GiB
  correct: a
  explanation: A Starter management cluster minimum is 3 control-plane nodes (2 vCPU / 8 GiB) and 2 worker nodes (4 vCPU / 8 GiB).
  source:
    label: Starter Cluster Minimum Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-resource-req-starter-cluster-min-r.html
    page: ''
    quote: 'Table 65: Resource Requirements for Management Cluster — Control Plane: 3 nodes, 2 vCPU, 8 GiB; Worker: 2 nodes, 4 vCPU, 8 GiB.'
- id: q152
  type: multiple_choice
  difficulty: advanced
  points: 15
  prompt: Which operating systems are supported on Nutanix infrastructure? (Select all that apply)
  options:
  - id: a
    text: Rocky Linux 9.6
  - id: b
    text: Ubuntu 22.04 and Ubuntu 24.04
  - id: c
    text: RHEL 8.10 and RHEL 9.6
  - id: d
    text: Windows Server 2022
  correct:
  - a
  - b
  - c
  explanation: On Nutanix infrastructure, supported OSes include Rocky Linux 9.6, Ubuntu 22.04, Ubuntu 24.04, RHEL 8.10, and RHEL 9.6. Windows is not supported.
  source:
    label: Supported Infrastructure Operating Systems
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nkp-supported-OS-c.html
    page: ''
    quote: 'Table 2 (Nutanix): Rocky Linux 9.6, Ubuntu 22.04, Ubuntu 24.04, RHEL 8.10, RHEL 9.6.'
