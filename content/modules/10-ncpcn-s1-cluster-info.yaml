id: ncpcn-s1-cluster-info
title: 1.6 Gather Cluster Build Information
track: NCP-CN Section 1
order: 16
icon: star
summary: 'Objective 1.6 covers the information you must gather before building an NKP cluster on a target provider: networking requirements (control-plane endpoint and port, default Pod/Service subnets and their non-overlap rules), connectivity details for Prism Central (endpoint, port, credentials), storage requirements (Nutanix CSI, raw storage, local-volume mounts), node sizing per license tier, supported operating systems and CPU architecture, and provider-specific parameters for pre-provisioned, Nutanix, AKS, and Azure deployments.

  '
questions:
- id: q125
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the default control-plane endpoint port if not otherwise specified?
  options:
  - id: a
    text: '443'
  - id: b
    text: '9440'
  - id: c
    text: '6443'
  - id: d
    text: '8443'
  correct: c
  explanation: The control-plane endpoint port defaults to 6443 unless a different port is specified.
  source:
    label: 'Pre-provisioned: Defining the Infrastructure'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-preprov-define-infra-t.html
    page: p.80
    quote: --control-plane-endpoint-port <control plane endpoint port, if different than 6443>
