- id: q138
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: In a pre-provisioned environment, how does NKP learn how to reach your cluster hosts?
  options:
  - id: a
    text: Cloud provider API
  - id: b
    text: Through inventory resources (PreprovisionedInventory) that define a control plane and at least one worker pool
  - id: c
    text: DHCP discovery
  - id: d
    text: Manual kubectl join
  correct: b
  explanation: In pre-provisioned environments, inventory resources (PreprovisionedInventory) define a control plane and at least one worker pool so NKP knows how to access the hosts.
  source:
    label: 'Pre-provisioned: Defining the Infrastructure'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-preprov-define-infra-t.html
    page: p.76
    quote: you must define the cluster hosts and infrastructure using the inventory resources. For the initial cluster creation, define a control plane and at least one worker pool.
