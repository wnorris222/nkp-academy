  points: 10
  prompt: What is required of the SSH user for pre-provisioned hosts?
  options:
  - id: a
    text: Must be a non-privileged user
  - id: b
    text: Must be root, or able to use sudo without a password (sshConfig port defaults to 22)
  - id: c
