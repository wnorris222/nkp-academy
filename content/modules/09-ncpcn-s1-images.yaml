id: ncpcn-s1-images
title: 1.5 Build Machine Images / Prepare Nodes
track: NCP-CN Section 1
order: 15
icon: rocket
summary: 'The Nutanix Image Builder (NIB/KIB) creates and manages pre-configured, CAPI-compliant OS images with the drivers, configs, and software NKP needs, reducing deployment and upgrade errors from OS/package misconfiguration. For pre-provisioned environments you instead configure existing nodes with nkp upload image-artifacts. Builds require Docker or Podman, a Linux/macOS AMD64 CLI host, Prism Central credentials, and a Pro/Ultimate license; the base OS image has minimum requirements (qcow2/img, cloud-init, Python 3.x, 20 GB root disk, UEFI Boot, no existing Kubernetes). Builds can be customized, GPU-enabled, and run in air-gapped mode.

  '
questions:
- id: q93
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the purpose of the Nutanix Image Builder (NIB / KIB)?
  options:
  - id: a
    text: To load container images into a registry
  - id: b
    text: To create and manage pre-configured OS images (with the configs, drivers, and software NKP needs), reducing deployment/upgrade errors from OS/package misconfiguration
  - id: c
    text: To create the bootstrap cluster
  - id: d
    text: To assign license keys
  correct: b
  explanation: NIB creates and manages pre-configured OS images containing the configurations, drivers, and software NKP needs, reducing cluster deployment and upgrade errors caused by OS/package misconfiguration.
  source:
    label: Konvoy Image Builder
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-konvoy-image-build-c.html
    page: p.53
    quote: Nutanix Image Builder (NIB) enables you to create and manage pre-configured operating systems (OS) images specifically for running NKP.
- id: q94
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What kind of machine images does NIB create?
  options:
  - id: a
    text: Docker container images
  - id: b
    text: Cluster API (CAPI)-compliant machine images
  - id: c
    text: Helm charts
  - id: d
    text: ISO installers only
  correct: b
  explanation: NIB creates Cluster API-compliant machine images configured with the software needed to deploy Kubernetes cluster nodes.
  source:
    label: Konvoy Image Builder
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-konvoy-image-build-c.html
    page: p.18
    quote: Nutanix Image Builder (NIB) creates Cluster API-compliant machine images.
- id: q95
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command builds a custom OS image on Nutanix?
  options:
  - id: a
    text: nkp build image
  - id: b
    text: nkp create image nutanix ${OS_TYPE} ...
  - id: c
    text: nkp image create --nutanix
  - id: d
    text: konvoy image build
  correct: b
  explanation: Build a custom Nutanix image with nkp create image nutanix ${OS_TYPE} plus the required flags.
  source:
    label: Creating a Nutanix VM Image
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-basic-ag-create-image-t.html
    page: ''
    quote: 'Run NKP CLI to create an image: nkp create image nutanix ${OS_TYPE} --cluster … --endpoint … --subnet … --source-image …'
- id: q96
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What are the two documented ways to add images for NKP?
  options:
  - id: a
    text: Only build custom images
  - id: b
    text: Use a Nutanix-provided image (Nutanix Infrastructure only), or build your own custom image on any supported provider
  - id: c
    text: Download from Docker Hub or GitHub
  - id: d
    text: Only use pre-built images
  correct: b
  explanation: You can either use a Nutanix-provided image (Nutanix Infrastructure only) or build your own custom image on any supported provider.
  source:
    label: Konvoy Image Builder
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-konvoy-image-build-c.html
    page: p.53
    quote: 'You can add images in the following ways: Use an image provided by Nutanix, for NKP on Nutanix Infrastructure… Build your own customized image for NKP on any of the supported Infrastructure Providers.'
- id: q100
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Does NIB support building custom machine images for AKS?
  options:
  - id: a
    text: Yes, fully supported
  - id: b
    text: No — AKS best practices discourage custom images, so NIB does not support building custom machine images for AKS
  - id: c
    text: Only in air-gapped mode
  - id: d
    text: Only for GPU nodes
  correct: b
  explanation: AKS discourages custom images (they break autoscaling/security), so NIB does not support building custom machine images for AKS.
  source:
    label: KIB for AKS
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-kib-for-aks-c.html
    page: p.263
    quote: AKS best practices discourage building custom images… Nutanix Image Builder (NIB) does not include any support for building custom machine images for AKS.
- id: q105
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What does uploading artifacts to pre-provisioned hosts accomplish?
  options:
  - id: a
    text: It builds a new VM image
  - id: b
    text: It configures existing machines with packages, container images, and GPU drivers so NKP can form a cluster quickly and consistently, reducing OS/package misconfiguration errors
  - id: c
    text: It seeds the private registry
  - id: d
    text: It installs the Kommander UI
  correct: b
  explanation: Uploading artifacts configures existing machines with packages, container images, and GPU drivers so NKP forms a cluster quickly and consistently, reducing OS/package misconfiguration errors.
  source:
    label: Pre-provisioned Prerequisites and Environment Variables
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nkp-preprov-prereq-envvar-c.html
    page: p.1048
    quote: Configure pre-provisioned hosts by uploading necessary artifacts such as packages, container images, and GPU drivers to existing nodes… reducing upgrade errors caused by OS image and package misconfiguration.
- id: q109
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which license tiers support building custom images?
  options:
  - id: a
    text: All tiers including Starter
  - id: b
    text: Pro and Ultimate — custom images are not supported on the NKP Starter license
  - id: c
    text: Starter only
  - id: d
    text: Ultimate only
  correct: b
  explanation: Custom images require Pro or Ultimate; they are not supported on the NKP Starter license.
  source:
    label: Konvoy Image Builder
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-konvoy-image-build-c.html
    page: p.55
    quote: Ensure that you subscribe to one of the NKP licenses such as Pro and Ultimate. Custom images are not supported on the NKP Starter license.
- id: q111
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: Which are minimum requirements for the base OS image? (Select all that apply)
  options:
  - id: a
    text: Source image in qcow2 or .img format; default user has sudo; SSH server installed/enabled
  - id: b
    text: cloud-init installed and configured; Python 3.x installed and accessible
  - id: c
    text: At least 20 GB root filesystem disk; UEFI Boot type
  - id: d
    text: No existing Kubernetes components present
  correct:
  - a
  - b
  - c
  - d
  explanation: 'All are minimum base OS image requirements: qcow2/img format, sudo default user, SSH server, cloud-init, Python 3.x, at least 20 GB root disk, UEFI Boot, and no existing Kubernetes components.'
  source:
    label: Nutanix Base OS Image Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-base-OS-image-c.html
    page: ''
    quote: The source image must be in qcow2 or .img format… default user must have sudo… install and enable the SSH server… install and configure cloud-init… install Python version 3.x… at least 20 GB of disk space on the root file system… Image must use UEFI Boot type… no existing Kubernetes components are present.
- id: q112
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the minimum root filesystem disk space required for the base OS image?
  options:
  - id: a
    text: 10 GB
  - id: b
    text: 20 GB
  - id: c
    text: 40 GB
  - id: d
    text: 80 GB
  correct: b
  explanation: At least 20 GB of disk space on the root filesystem is required.
  source:
    label: Nutanix Base OS Image Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-base-OS-image-c.html
    page: ''
    quote: Ensure at least 20 GB of disk space on the root file system is available.
- id: q114
  type: true_false
  difficulty: core
  points: 10
  prompt: 'True/False: The base OS image may already contain Kubernetes components before building.'
  options:
  - id: 'true'
    text: 'True'
  - id: 'false'
    text: 'False'
  correct: 'false'
  explanation: False. The base OS image must have no existing Kubernetes components present.
  source:
    label: Nutanix Base OS Image Requirements
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-nutanix-base-OS-image-c.html
    page: ''
    quote: Ensure that no existing Kubernetes components are present.
- id: q116
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which variable validates configurations by running the build without creating artifacts?
  options:
  - id: a
    text: DRY_RUN=true
  - id: b
    text: VALIDATE=true
  - id: c
    text: NOOP=true
  - id: d
    text: TEST=true
  correct: a
  explanation: DRY_RUN=true runs the build without creating artifacts (or deletes them after), useful for validating configs and testing overrides.
  source:
    label: Konvoy Image Builder CLI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-kib-cli-c.html
    page: p.60
    quote: 'Enable dry-run mode: export DRY_RUN=true. When set to true, the build process runs without creating artifacts, or deletes them after creating.'
