    text: To bypass FIPS
  correct: b
  explanation: OS packages normally come from internet repositories; air-gapped environments can't reach them, so you create a package bundle where the repos are accessible and transfer it to build the image offline.
  source:
    label: Creating an Air-gapped Package Bundle
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-creating-air-gapped-package-bundle-t.html
    page: p.57
    quote: As air-gapped environments are restricted from accessing these package repositories, you must first create a package bundle where the repositories can be accessed. Then, transfer this bundle to an air-gapped environment.
- id: q122
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: From what kind of machine must nkp create package-bundle be executed?
  options:
  - id: a
    text: From the bastion host only
  - id: b
    text: From a machine that has access to the OS vendor's package repositories (internet access)
  - id: c
    text: From an air-gapped node
  - id: d
    text: From Prism Central
  correct: b
  explanation: Run nkp create package-bundle from a machine that has access to the OS vendor's package repositories (internet access).
  source:
    label: Creating an Air-gapped Package Bundle
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-creating-air-gapped-package-bundle-t.html
    page: p.58
    quote: Ensure the nkp create package-bundle command is executed from a machine that has access to the package repositories hosted by the OS vendor.
- id: q123
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What does the --bundle flag (IMAGE_BUNDLE) do in an air-gapped build?
  options:
  - id: a
    text: Nothing in air-gapped mode
  - id: b
    text: Pre-loads the container image bundle(s) into the OS image during the build (multiple bundles as a comma-separated list of .tar files)
  - id: c
    text: Uploads the image to the registry
  - id: d
    text: Signs the image
  correct: b
  explanation: The --bundle flag (IMAGE_BUNDLE) pre-loads container image bundle(s) into the OS image during the build; multiple bundles are given as a comma-separated list of .tar files.
  source:
    label: Creating an Air-gapped Package Bundle
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-creating-air-gapped-package-bundle-t.html
    page: p.59
    quote: The --bundle flag is used in an air-gapped environment where the container image needs to be pre-loaded into the OS image… Multiple bundles can be provided as a comma-separated list. Each file must be in .tar format.
