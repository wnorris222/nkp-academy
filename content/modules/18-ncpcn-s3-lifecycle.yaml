- id: q175
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: After deleting a managed cluster in the self-managed workflow, what do you delete next?
  options:
  - id: a
    text: The management cluster
  - id: b
    text: The bootstrap cluster (nkp delete bootstrap)
  - id: c
