id: ncpcn-s3-lifecycle
title: 3.6 Lifecycle Management
track: NCP-CN Section 3
order: 36
icon: trophy
summary: 'Lifecycle management covers upgrading NKP (Pro and Ultimate) in the correct sequence, upgrading the Kubernetes version on managed clusters (control plane first, then each worker node pool), and related day-2 upgrade workflows such as managing and scaling node pools and deleting clusters cleanly with the NKP CLI.

  '
questions:
- id: q147
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the correct NKP upgrade sequence?
  options:
  - id: a
    text: Kubernetes version first, then Kommander
  - id: b
    text: 1) Kommander, 2) Platform Applications on managed/attached clusters, 3) Management and Managed clusters (Kubernetes)
  - id: c
    text: Delete then recreate
  - id: d
    text: Any order
  correct: b
  explanation: 'Upgrade in sequence: 1) Kommander, 2) Platform Applications on managed/attached clusters, 3) Management and Managed clusters (Kubernetes).'
  source:
    label: Upgrade NKP Ultimate
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-ug-nkp-ultimate-c.html
    page: ''
    quote: 'Upgrade your NKP environment in the following sequence to avoid compatibility issues:'
- id: q148
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What must you upgrade before upgrading the Kubernetes version on attached clusters?
  options:
  - id: a
    text: The node pools
  - id: b
    text: Kommander — always upgrade Kommander first to avoid Kubernetes API compatibility issues
  - id: c
    text: The license
  - id: d
    text: The bastion host
  correct: b
  explanation: Always upgrade Kommander before upgrading the Kubernetes version in attached clusters to apply required updates for new/updated Kubernetes APIs.
  source:
    label: Upgrade Kommander
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-up-kommander-t.html
    page: ''
    quote: Always upgrade Kommander before upgrading the Kubernetes version in attached clusters to apply any required updates for new or updated Kubernetes APIs.
- id: q149
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command upgrades Kommander in a non-air-gapped environment?
  options:
  - id: a
    text: nkp update kommander
  - id: b
    text: nkp upgrade kommander
  - id: c
    text: helm upgrade kommander
  - id: d
    text: nkp kommander upgrade
  correct: b
  explanation: Upgrade Kommander (non-air-gapped) with nkp upgrade kommander.
  source:
    label: Upgrade Kommander
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-up-kommander-t.html
    page: ''
    quote: 'For non-air-gapped environments, run the upgrade command: nkp upgrade kommander.'
- id: q150
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you upgrade Kommander in an air-gapped environment?
  options:
  - id: a
    text: It is not supported
  - id: b
    text: nkp upgrade kommander --kommander-applications-repository ./application-repositories/kommander-applications-nkp-version.tar.gz (run from the extracted bundle root)
  - id: c
    text: nkp upgrade kommander --offline
  - id: d
    text: Copy files manually
  correct: b
  explanation: For air-gapped, run nkp upgrade kommander --kommander-applications-repository ./application-repositories/kommander-applications-nkp-version.tar.gz from the extracted bundle root.
  source:
    label: Upgrade Kommander
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-up-kommander-t.html
    page: ''
    quote: 'For air-gapped environments, run the upgrade command with the repository path: nkp upgrade kommander --kommander-applications-repository.'
- id: q152
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Within a cluster, in what order do you upgrade the Kubernetes version?
  options:
  - id: a
    text: Workers first, then control plane
  - id: b
    text: Control plane first, then each worker node pool
  - id: c
    text: All at once
  - id: d
    text: Only the control plane
  correct: b
  explanation: Upgrade the control plane first, then each worker node pool, to maintain stability and minimize downtime.
  source:
    label: Upgrading Kubernetes Version on a Managed Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-up-ultimate-managed-cluster-k8s-ver-t.html
    page: p.1057
    quote: Upgrade the Kubernetes version by first upgrading the control plane, then upgrading each worker node pool.
- id: q155
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Do you upgrade the management cluster or workload clusters first?
  options:
  - id: a
    text: Workload first
  - id: b
    text: Complete the management cluster upgrade before upgrading any workload clusters
  - id: c
    text: Simultaneously
  - id: d
    text: Order doesn't matter
  correct: b
  explanation: Complete the management cluster upgrade before upgrading any workload clusters.
  source:
    label: Upgrading Kubernetes Version on a Managed Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-up-ultimate-managed-cluster-k8s-ver-t.html
    page: p.1062
    quote: Complete the management cluster upgrade before upgrading any workload clusters.
- id: q156
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: 'Scenario: you must move a workload cluster to a newer Kubernetes version. Which commands apply?'
  options:
  - id: a
    text: Only nkp upgrade kommander
  - id: b
    text: nkp update controlplane <provider> ... then nkp update nodepool <provider> ...
  - id: c
    text: Delete and recreate the cluster
  - id: d
    text: Edit the kubelet on each node
  correct: b
  explanation: Move a workload cluster to a new Kubernetes version by upgrading the control plane (nkp update controlplane) and then each node pool (nkp update nodepool).
  source:
    label: Upgrading Kubernetes Version on a Managed Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-up-ultimate-managed-cluster-k8s-ver-t.html
    page: p.1063
    quote: Upgrade the control plane to the new Kubernetes version, then Upgrade the node pool to match the control plane Kubernetes version.
- id: q161
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command creates a new node pool?
  options:
  - id: a
    text: kubectl create nodepool
  - id: b
    text: nkp create nodepool <provider> -c ${CLUSTER_NAME} ${NODEPOOL_NAME} ...
  - id: c
    text: nkp add nodes
  - id: d
    text: helm install nodepool
  correct: b
  explanation: Create a node pool with nkp create nodepool <provider> -c ${CLUSTER_NAME} ${NODEPOOL_NAME} and the provider flags.
  source:
    label: Create Pre-provisioned Node Pools
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-create-preprov-node-pools-t.html
    page: ''
    quote: nkp create nodepool vsphere ${NODEPOOL_NAME} --cluster-name=${CLUSTER_NAME} creates the MachineDeployment, machine template, and KubeadmConfigTemplate.
- id: q164
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Why would you create additional node pools?
  options:
  - id: a
    text: To duplicate the cluster
  - id: b
    text: To manage machines that share specialized properties (e.g., GPU, extra memory, different availability zones)
  - id: c
    text: To store backups
  - id: d
    text: To run the control plane
  correct: b
  explanation: Create additional node pools to manage machines with specialized properties — GPUs, extra memory, specialized networking/storage, or nodes in different availability zones.
  source:
    label: Creating vSphere Node Pools
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-create-vsphere-node-pools-t.html
    page: ''
    quote: Creating a node pool is useful when you want to run workloads that require machines with specific resources, such as a GPU, additional memory, or specialized network or storage hardware.
- id: q171
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command deletes a Kubernetes cluster?
  options:
  - id: a
    text: kubectl delete cluster
  - id: b
    text: nkp delete cluster --cluster-name=${CLUSTER_NAME} --kubeconfig $HOME/.kube/config
  - id: c
    text: nkp remove cluster
  - id: d
    text: helm uninstall cluster
  correct: b
  explanation: Delete a cluster with nkp delete cluster --cluster-name=${CLUSTER_NAME} --kubeconfig $HOME/.kube/config.
  source:
    label: Delete an AWS Cluster
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-delete-aws-cluster-t.html
    page: ''
    quote: nkp delete cluster --cluster-name=${CLUSTER_NAME} --kubeconfig $HOME/.kube/config.
