- id: q176
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Why should you NOT skip LoadBalancer deletion when the VPC is managed by NKP?
  options:
  - id: a
    text: It's faster to skip
  - id: b
    text: NKP deletes the VPC; if the VPC still has AWS Classic ELBs, AWS won't allow the VPC to be deleted and NKP cannot delete the cluster
  - id: c
    text: Skipping corrupts etcd
  - id: d
    text: There is no reason
  correct: b
  explanation: If you skip LB deletion and the VPC is NKP-managed, NKP tries to delete the VPC; AWS won't delete a VPC that still has Classic ELBs, so NKP cannot delete the cluster.
  source:
    label: Upgrade NKP Pro
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-ug-nkp-pro-c.html
    page: p.806
    quote: If the VPC has any AWS Classic ELBs, AWS does not allow the VPC to be deleted, and NKP cannot delete the cluster.
