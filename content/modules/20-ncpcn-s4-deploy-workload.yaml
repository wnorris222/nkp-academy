  prompt: Cluster creation fails due to the cluster name. What is a common cause?
  options:
  - id: a
    text: The name is too short
  - id: b
    text: The name contains uppercase letters — only a-z, 0-9, ., and - are allowed
  - id: c
    text: The name has numbers
  - id: d
    text: Names are optional
  correct: b
  explanation: Cluster creation fails if the name has uppercase letters — a cluster name can include only a-z, 0-9, ., and -.
