    label: Specify Nutanix Cluster Information
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-specify-nutanix-cluster-info-t.html
    page: ''
    quote: Cluster Name... Infrastructure Provider... Kubernetes Version... SSH Username... SSH Public Key...
- id: q55
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: If you do NOT set a workspace when creating a cluster with the CLI, where is it placed?
  options:
  - id: a
    text: It fails
  - id: b
    text: In the default workspace (you then manually attach it to the desired workspace)
  - id: c
    text: In kube-system
  - id: d
    text: On the bootstrap cluster
  correct: b
  explanation: If you don't set a workspace, the cluster is created in the default workspace; you then manually attach it to your desired workspace.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.209
    quote: if you do not set a workspace, the attached cluster will be created in the default workspace.
- id: q56
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Does a CLI-created managed cluster attach to the Management cluster automatically?
  options:
  - id: a
    text: No, always manual
  - id: b
    text: Yes — it attaches automatically to the Management cluster after a few moments
  - id: c
    text: Only via the UI
  - id: d
    text: Only with Ultimate
  correct: b
  explanation: A CLI-created managed cluster attaches automatically to the Management cluster after a few moments.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.209
    quote: When you create a Managed Cluster with the NKP CLI, it attaches automatically to the Management Cluster after a few moments.
- id: q57
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you retrieve a managed cluster's kubeconfig after creation?
  options:
  - id: a
    text: Copy it from a node
  - id: b
    text: nkp get kubeconfig --cluster-name ${MANAGED_CLUSTER_NAME} --kubeconfig <mgmt-kubeconfig> -n ${WORKSPACE_NAMESPACE} > ${MANAGED_CLUSTER_NAME}.conf
  - id: c
    text: kubectl config view
  - id: d
    text: It is not retrievable
  correct: b
  explanation: Retrieve the kubeconfig with nkp get kubeconfig --cluster-name ${MANAGED_CLUSTER_NAME} --kubeconfig <mgmt-kubeconfig> -n ${WORKSPACE_NAMESPACE} > ${MANAGED_CLUSTER_NAME}.conf.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.208
    quote: nkp get kubeconfig --cluster-name ${MANAGED_CLUSTER_NAME} --kubeconfig <management-cluster-kubeconfig-path> -n ${WORKSPACE_NAMESPACE} > ${MANAGED_CLUSTER_NAME}.conf.
- id: q58
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command checks a workload cluster's deployment status (readiness tree of Cluster, ControlPlane, Machines)?
  options:
  - id: a
    text: nkp describe cluster -c ${CLUSTER_NAME}
  - id: b
    text: kubectl get svc
  - id: c
    text: nkp status
  - id: d
    text: helm status
  correct: a
  explanation: Check deployment status with nkp describe cluster -c ${CLUSTER_NAME}, which prints a readiness tree (Cluster, ControlPlane, Machines).
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.183
    quote: 'Check the current status of the cluster: nkp describe cluster -c ${CLUSTER_NAME}... Cluster/... True ... ##ControlPlane ... ##Workers.'
- id: q59
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: New nodes show NotReady shortly after deployment. What is the likely benign cause?
  options:
  - id: a
    text: The cluster failed
  - id: b
    text: The Pod network is still deploying — nodes become Ready soon after the calico-node DaemonSet Pods are Ready
  - id: c
    text: The license expired
  - id: d
    text: The registry is down
  correct: b
  explanation: NotReady nodes shortly after deployment are usually waiting for the Pod network — they become Ready soon after the calico-node DaemonSet Pods are Ready.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.185
    quote: It may take a few minutes for the Status to move to Ready while the Pod network is deployed. The node status will change to Ready soon after the calico-node DaemonSet Pods are Ready.
- id: q60
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: 'Scenario: managed Nutanix cluster provisioning fails. Which network requirement should you verify?'
  options:
  - id: a
    text: Internet access on every node
  - id: b
    text: That the management cluster has seamless network access to the Prism Central (PC) environment
  - id: c
    text: That the bastion is offline
  - id: d
    text: That DNS is disabled
  correct: b
  explanation: Ensure the management cluster has seamless network access to the Prism Central (PC) environment to avoid provisioning issues.
  source:
    label: Creating a Managed Cluster on VCD Through the NKP UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-create-a-managed-cluster-on-vcd-through-nkp-ui-t.html
    page: p.462
    quote: Before provisioning a managed cluster, ensure your network allows seamless access from the management cluster to the Prism Central (PC) environment to avoid provisioning issues.
- id: q61
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you verify the nodes and pods on the newly created cluster?
  options:
  - id: a
    text: kubectl --kubeconfig=${CLUSTER_NAME}.conf get nodes and get pods -A
  - id: b
    text: nkp verify
  - id: c
    text: ping the nodes
  - id: d
    text: Check the license page
  correct: a
  explanation: Verify nodes and pods with kubectl --kubeconfig=${CLUSTER_NAME}.conf get nodes and kubectl --kubeconfig=${CLUSTER_NAME}.conf get pods -A.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.208
