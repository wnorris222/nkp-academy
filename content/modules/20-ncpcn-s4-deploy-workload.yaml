id: ncpcn-s4-deploy-workload
title: 4.2 Deploy Workload Clusters
track: NCP-CN Section 4
order: 42
icon: rocket
summary: 'Deploying managed (workload) clusters into a workspace via the NKP UI and CLI across infrastructure providers (Nutanix, vSphere, VCD), how the target provider shapes the default StorageClass, and how to verify and troubleshoot a newly provisioned cluster.

  '
questions:
- id: q35
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What are the three cluster types in NKP?
  options:
  - id: a
    text: Master, Worker, Edge
  - id: b
    text: Management Cluster, Managed Cluster, and Attached Cluster
  - id: c
    text: Dev, Test, Prod
  - id: d
    text: Primary, Secondary, Backup
  correct: b
  explanation: 'NKP has three cluster types: Management Cluster, Managed Cluster, and Attached Cluster.'
  source:
    label: NKP Cluster Types
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-nkp-cluster-types-c.html
    page: ''
    quote: Management Cluster (All NKP editions)... Managed Cluster (All NKP editions)... Attached Cluster (NKP Ultimate only)...
- id: q36
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is a Managed Cluster (an 'NKP cluster')?
  options:
  - id: a
    text: A cluster created outside NKP
  - id: b
    text: A type of workload cluster created with NKP whose infrastructure, life cycle, and applications are managed by the NKP Management cluster
  - id: c
    text: The bootstrap cluster
  - id: d
    text: A single-node cluster
  correct: b
  explanation: A Managed Cluster (also called an 'NKP cluster') is a workload cluster you create with NKP; the Management cluster manages its infrastructure, life cycle, and applications.
  source:
    label: NKP Cluster Types
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-nkp-cluster-types-c.html
    page: ''
    quote: 'Managed Cluster (All NKP editions): Also called an ''NKP cluster,'' this is a type of workload cluster that you can create with NKP.'
- id: q37
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is an Attached Cluster, and which license tier is required?
  options:
  - id: a
    text: A cluster NKP provisions; Starter
  - id: b
    text: A cluster created outside NKP and connected so NKP manages its applications (not its lifecycle); NKP Ultimate only
  - id: c
    text: A managed cluster; Pro
  - id: d
    text: A bootstrap cluster; any tier
  correct: b
  explanation: An Attached Cluster is created outside NKP and then connected so NKP manages its applications (its lifecycle is not managed by NKP); Attached Clusters are NKP Ultimate only.
  source:
    label: NKP Cluster Types
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-nkp-cluster-types-c.html
    page: ''
    quote: 'Attached Cluster (NKP Ultimate only): This is a type of managed cluster that is created outside of NKP but is then connected to the NKP Management Cluster so that NKP can manage it''s applications.'
- id: q38
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How does the target provider affect the default storage on a workload cluster?
  options:
  - id: a
    text: Storage is identical everywhere
  - id: b
    text: Each provider has its own default CSI (e.g., vSphere uses the vSphere CSI driver); pre-provisioned defaults to a local static provisioner that is not suitable for production
  - id: c
    text: There is no default storage
  - id: d
    text: Storage is always NFS
  correct: b
  explanation: 'Storage default depends on the provider: vSphere uses the vSphere CSI driver; pre-provisioned defaults to a local static provisioner that is not suitable for production (use a production-grade CSI).'
  source:
    label: 'Pre-provisioned Non-air-gapped — Creating a New Cluster'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-preprovNONAG-custom-create-cluster-t.html
    page: ''
    quote: NKP uses a local static provisioner as the default storage provider for a pre-provisioned environment... localvolumeprovisioner is not suitable for production use.
- id: q39
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: Which provider-specific inputs does a vSphere workload cluster require? (Select all that apply)
  options:
  - id: a
    text: VSPHERE_SERVER, VSPHERE_USERNAME, VSPHERE_PASSWORD
  - id: b
    text: --network, --data-center, --data-store, --folder
  - id: c
    text: --resource-pool, --vm-template, --server
  - id: d
    text: An AWS access key
  correct:
  - a
  - b
  - c
  explanation: 'A vSphere workload cluster needs VSPHERE_SERVER/USERNAME/PASSWORD plus provider flags: --network, --data-center, --data-store, --folder, --server, --resource-pool, and --vm-template.'
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.208
    quote: nkp create cluster vsphere --cluster-name ... --namespace ${WORKSPACE_NAMESPACE} --network ... --data-center ... --data-store ... --folder ... --server ... --resource-pool ... --vm-template ...
- id: q40
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: On a provider like vSphere/pre-provisioned, how do you avoid Docker Hub rate limits during cluster creation?
  options:
  - id: a
    text: Disable Docker
  - id: b
    text: Set --registry-mirror-url=https://registry-1.docker.io with --registry-mirror-username/password (Docker Hub credentials)
  - id: c
    text: Use a bigger cluster
  - id: d
    text: Nothing can be done
  correct: b
  explanation: Provide Docker Hub credentials via --registry-mirror-url=https://registry-1.docker.io with --registry-mirror-username/password to raise the Docker Hub rate limit.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.200
    quote: To increase Docker Hub's rate limit, use your Docker Hub credentials when creating the cluster by setting...
- id: q41
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which capability requires NKP Ultimate for workload clusters?
  options:
  - id: a
    text: Creating a single managed cluster
  - id: b
    text: Attaching externally-created clusters and managing clusters across multiple infrastructure providers
  - id: c
    text: Using the CLI
  - id: d
    text: Naming a cluster
  correct: b
  explanation: NKP Ultimate is required to attach externally-created clusters and to manage clusters across multiple infrastructure providers.
  source:
    label: Infrastructure Providers
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-infrastructure-providers-c.html
    page: p.310
    quote: NKP Ultimate supports a multi-cluster environment... of multiple infrastructure providers.
- id: q42
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Where are customers encouraged to run workloads?
  options:
  - id: a
    text: On the Management cluster
  - id: b
    text: On Managed and Attached clusters — not on the Management cluster (except in single-cluster environments)
  - id: c
    text: On the bootstrap cluster
  - id: d
    text: On worker nodes of the management cluster
  correct: b
  explanation: Customers are encouraged to run workloads on Managed and Attached clusters, not on the Management cluster (except in single-cluster environments).
  source:
    label: NKP Cluster Types
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-nkp-cluster-types-c.html
    page: ''
    quote: Customers are encouraged to run workloads on Managed and Attached clusters not on the Management cluster except in single-cluster environments.
- id: q43
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is the purpose of deploying managed (workload) clusters?
  options:
  - id: a
    text: To replace the management cluster
  - id: b
    text: To run workloads while the NKP Management cluster centrally manages their infrastructure, life cycle, and applications
  - id: c
    text: To store backups
  - id: d
    text: To host the registry
  correct: b
  explanation: Deploying managed (workload) clusters lets you run workloads while the NKP Management cluster centrally manages their infrastructure, life cycle, and applications.
  source:
    label: NKP Cluster Types
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-nkp-cluster-types-c.html
    page: ''
    quote: The NKP Management cluster manages its infrastructure, its life cycle, and its applications.
- id: q44
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How does a single-cluster environment differ from a multi-cluster environment?
  options:
  - id: a
    text: They are the same
  - id: b
    text: Single-cluster is a stand-alone self-managed cluster running all workloads; multi-cluster has a Management cluster plus Managed/Attached clusters
  - id: c
    text: Single-cluster has no workloads
  - id: d
    text: Multi-cluster has no management cluster
  correct: b
  explanation: A single-cluster environment is a stand-alone self-managed cluster running all workloads; a multi-cluster environment has a Management cluster plus Managed/Attached clusters.
  source:
    label: NKP Cluster Types
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-nkp-cluster-types-c.html
    page: ''
    quote: The initial NKP cluster is a stand-alone cluster. It is self-managed... all workloads are run on your single NKP cluster.
- id: q45
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: When creating a managed cluster, do you install Kommander or create/move CAPI objects on it?
  options:
  - id: a
    text: Yes, always
  - id: b
    text: No — those tasks are only done on Management clusters
  - id: c
    text: Only Kommander
  - id: d
    text: Only CAPI objects
  correct: b
  explanation: You do not install Kommander or create/move CAPI objects on a managed cluster — those tasks are only done on Management clusters.
  source:
    label: 'Azure — Create Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-azure-create-managed-clusters-nkp-cli-t.html
    page: ''
    quote: When creating managed clusters, do not create and move CAPI objects or install the Kommander component. Those tasks are only done on Management clusters.
- id: q46
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Are subsequent clusters (after the first) self-managed?
  options:
  - id: a
    text: 'Yes'
  - id: b
    text: No — they are not self-managed; they are managed or attached clusters of the Management cluster
  - id: c
    text: Only on AWS
  - id: d
    text: Only with Ultimate
  correct: b
  explanation: Subsequent clusters are not self-managed; they are managed or attached clusters of the Management cluster.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.86
    quote: Subsequent new clusters are not self-managed as they are likely to be managed or attached clusters to this Management Cluster.
- id: q47
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What manages a managed cluster's lifecycle?
  options:
  - id: a
    text: The cluster manages itself
  - id: b
    text: The NKP Management cluster
  - id: c
    text: Prism Central directly
  - id: d
    text: The bastion host
  correct: b
  explanation: A managed cluster's life cycle is managed by the NKP Management cluster.
  source:
    label: Workspaces
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-workspaces-c.html
    page: p.19
    quote: A managed cluster is a Kubernetes cluster whose life cycle is managed by a management cluster.
- id: q48
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you assign a new managed cluster to a specific workspace when creating it with the CLI?
  options:
  - id: a
    text: Edit a ConfigMap
  - id: b
    text: Set WORKSPACE_NAMESPACE and pass --namespace ${WORKSPACE_NAMESPACE} on the nkp create cluster command
  - id: c
    text: Use --workspace-id
  - id: d
    text: It is chosen automatically
  correct: b
  explanation: Assign a managed cluster to a workspace by setting WORKSPACE_NAMESPACE and passing --namespace ${WORKSPACE_NAMESPACE} on nkp create cluster.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.86
    quote: Your new managed cluster must be part of a workspace... set that workspace's environment variable... --namespace ${WORKSPACE_NAMESPACE}.
- id: q49
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command lists existing workspaces so you can pick one?
  options:
  - id: a
    text: nkp get clusters
  - id: b
    text: kubectl get workspace -A
  - id: c
    text: nkp list workspaces
  - id: d
    text: kubectl get namespaces
  correct: b
  explanation: List existing workspaces with kubectl get workspace -A.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.86
    quote: If you have an Ultimate license and an existing workspace name, run this command to find the name. kubectl get workspace -A.
- id: q50
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For non-Ultimate license tiers, what happens to the workspace when you create a managed cluster?
  options:
  - id: a
    text: Creation fails
  - id: b
    text: A new workspace is automatically created
  - id: c
    text: It uses kube-system
  - id: d
    text: You must buy Ultimate
  correct: b
  explanation: For non-Ultimate tiers, a new workspace is automatically created.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.86
    quote: For other licence tiers, a new workspace will be automatically created.
- id: q51
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which flag targets the Management cluster's kubeconfig when creating a managed cluster from the CLI?
  options:
  - id: a
    text: --kubeconfig=<management-cluster-kubeconfig-path>
  - id: b
    text: --context=managed
  - id: c
    text: --admin
  - id: d
    text: --remote
  correct: a
  explanation: Target the Management cluster's kubeconfig with --kubeconfig=<management-cluster-kubeconfig-path> when creating a managed cluster.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.208
    quote: nkp create cluster vsphere ... --kubeconfig=<management-cluster-kubeconfig-path>.
- id: q52
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which command creates a managed vSphere cluster in a workspace via the CLI?
  options:
  - id: a
    text: kubectl create cluster
  - id: b
    text: nkp create cluster vsphere --cluster-name ${MANAGED_CLUSTER_NAME} --namespace ${WORKSPACE_NAMESPACE} --network ... --vm-template ... --kubeconfig=<mgmt-kubeconfig>
  - id: c
    text: nkp deploy vsphere
  - id: d
    text: helm install cluster
  correct: b
  explanation: Create a managed vSphere cluster with nkp create cluster vsphere --cluster-name ... --namespace ${WORKSPACE_NAMESPACE} --network ... --vm-template ... --kubeconfig=<mgmt-kubeconfig>.
  source:
    label: 'vSphere: Creating Managed Clusters Using the NKP CLI'
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-vsphere-create-managed-clusters-nkp-cli-t.html
    page: p.208
    quote: nkp create cluster vsphere --cluster-name ${MANAGED_CLUSTER_NAME} --namespace ${WORKSPACE_NAMESPACE} --network ... --kubeconfig=<management-cluster-kubeconfig-path>.
- id: q53
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you deploy a managed cluster through the NKP UI?
  options:
  - id: a
    text: Edit YAML directly
  - id: b
    text: In the target workspace dashboard, select Add Cluster > Create Cluster and complete the provisioning form
  - id: c
    text: Use the CLI only
  - id: d
    text: Restart the management cluster
  correct: b
  explanation: In the UI, open the target workspace dashboard, select Add Cluster > Create Cluster, and complete the provisioning form.
  source:
    label: Specify Nutanix Cluster Information
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-specify-nutanix-cluster-info-t.html
    page: ''
    quote: In the selected workspace Dashboard, select the Add Cluster button at the top right... Select the Create Cluster card.
- id: q54
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: Which fields does the UI cluster-creation form require? (Select all that apply)
  options:
  - id: a
    text: Cluster Name and Infrastructure Provider
  - id: b
    text: Kubernetes Version
  - id: c
    text: SSH Username and SSH Public Key
  - id: d
    text: A backup schedule
  correct:
  - a
  - b
  - c
  explanation: The UI form requires the Cluster Name, Infrastructure Provider, Kubernetes Version, SSH Username, and SSH Public Key (and optional labels).
