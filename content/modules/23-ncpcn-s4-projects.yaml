id: ncpcn-s4-projects
title: 4.5 Configure Projects
track: NCP-CN Section 4
order: 45
icon: badge
summary: 'Configure NKP Projects: create projects and their federated namespaces, manage access with project role bindings, and run continuous deployment via Flux/GitOps. Add clusters by manual selection or dynamic labels, federate resources, and set project quotas and limit ranges.

  '
questions:
- id: q117
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is a Project in NKP?
  options:
  - id: a
    text: A single namespace on one cluster
  - id: b
    text: A pre-defined subset group of Kubernetes clusters (under NKP management) that receives a common, federated configuration
  - id: c
    text: A node pool
  - id: d
    text: A backup schedule
  correct: b
  explanation: A Project is a pre-defined subset group of Kubernetes clusters under NKP management that receives a common, federated configuration.
  source:
    label: Creating a Project Using the UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-create-a-project-using-ui-t.html
    page: p.418
    quote: This pre-defined subset group of Kubernetes clusters is called a Project.
- id: q118
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What can Projects manage across their clusters?
  options:
  - id: a
    text: Only pods
  - id: b
    text: ConfigMaps, continuous deployments, secrets, services, quotas, RBAC, and multi-tenant logging via federated resources
  - id: c
    text: Only storage
  - id: d
    text: Only licenses
  correct: b
  explanation: Projects manage configMaps, continuous deployments, secrets, services, quotas, role-based access control, and multi-tenant logging by leveraging federated resources.
  source:
    label: Projects
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-projects-c.html
    page: ''
    quote: Projects support the management of configMaps, continuous deployments, secrets, services, quotas, and role-based access control and multi-tenant logging by leveraging federated resources.
- id: q119
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which technology does NKP leverage to coordinate configuration across a Project's clusters?
  options:
  - id: a
    text: Ansible
  - id: b
    text: Kubernetes Cluster Federation (KubeFed)
  - id: c
    text: Terraform
  - id: d
    text: Helm only
  correct: b
  explanation: NKP leverages Kubernetes Cluster Federation (KubeFed) to coordinate the configuration of multiple clusters in a Project.
  source:
    label: Projects
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-projects-c.html
    page: ''
    quote: Using Projects, NKP leverages Kubernetes Cluster Federation (KubeFed) to coordinate the configuration of multiple Kubernetes clusters.
- id: q120
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is a primary use case for Projects?
  options:
  - id: a
    text: Deleting clusters
  - id: b
    text: Letting central IT or a business unit share Kubernetes clusters among several teams and deploy configs/services consistently
  - id: c
    text: Building images
  - id: d
    text: Licensing
  correct: b
  explanation: Projects let central IT or a business unit share their Kubernetes clusters among several teams and deploy configurations/services consistently.
  source:
    label: Projects
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-projects-c.html
    page: ''
    quote: Projects enable central IT or a business unit to share their Kubernetes clusters among several teams… enable teams to deploy their configurations and services to clusters in a consistent way.
- id: q121
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is a Project Namespace?
  options:
  - id: a
    text: A cloud region
  - id: b
    text: A Kommander federated namespace created on all clusters matching the project labels, isolating configurations across clusters
  - id: c
    text: A node label
  - id: d
    text: A storage class
  correct: b
  explanation: A Project Namespace is a Kommander federated namespace created on all clusters matching the project labels; it isolates configurations across clusters.
  source:
    label: Projects
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-projects-c.html
    page: ''
    quote: Project Namespaces isolate configurations across clusters and are created on all clusters matching the project labels.
- id: q122
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How does Kommander determine which clusters belong to a Project?
  options:
  - id: a
    text: By IP address
  - id: b
    text: By labels — you select clusters manually or define labels for dynamic association
  - id: c
    text: By node count
  - id: d
    text: Randomly
  correct: b
  explanation: Kommander uses labels — you select clusters manually or define labels for dynamic association — to determine a Project's clusters.
  source:
    label: Projects
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-projects-c.html
    page: ''
    quote: Kommander allows a user to use labels to select, manually or dynamically, the Kubernetes clusters associated with a Project.
- id: q124
  type: scenario
  difficulty: core
  points: 15
  prompt: 'Scenario: you will add more clusters later and want them auto-included in a Project. What do you configure?'
  options:
  - id: a
    text: A manual list only
  - id: b
    text: A label selector so matching clusters are added dynamically
  - id: c
    text: A new workspace
  - id: d
    text: A quota
  correct: b
  explanation: Configure a label selector so matching clusters are added dynamically — future clusters with matching labels join automatically.
  source:
    label: Create a Project Using the UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-create-a-project-using-ui-t.html
    page: ''
    quote: define labels that Kommander will use to dynamically add clusters… to have them automatically associated with Projects based on their labels.
- id: q126
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is created on each cluster whose labels match a Project?
  options:
  - id: a
    text: A new control plane
  - id: b
    text: The Project's federated namespace
  - id: c
    text: A load balancer
  - id: d
    text: A bootstrap cluster
  correct: b
  explanation: When a cluster's labels match, the Project's federated namespace is created on it.
  source:
    label: Projects
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-projects-c.html
    page: ''
    quote: When a Project is created, NKP creates a federated namespace that is propagated to the Kubernetes clusters associated with this Project… created on all clusters matching the project labels.
- id: q127
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What do Project Role Bindings do?
  options:
  - id: a
    text: Create namespaces
  - id: b
    text: Assign a specific project role to a specific group of users, providing controlled access to project resources
  - id: c
    text: Delete clusters
  - id: d
    text: Enable CD
  correct: b
  explanation: Project role bindings assign a specific project role to a specific group of users, providing controlled access to project resources.
  source:
    label: Project Role Bindings
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-project-role-bindings-c.html
    page: ''
    quote: Project role bindings assign a specific project role to a specific group of users, providing controlled access to the project resources.
- id: q136
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What backs Project CD (Continuous Deployment) in NKP?
  options:
  - id: a
    text: Jenkins
  - id: b
    text: Flux (FluxCD) using GitOps processes
  - id: c
    text: ArgoCD only
  - id: d
    text: Cron jobs
  correct: b
  explanation: Project CD is backed by Flux (FluxCD), which continuously deploys applications using GitOps processes.
  source:
    label: Project Deployments
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-project-deployments-c.html
    page: ''
    quote: Use Project Deployments to manage GitOps based Continuous Deployments… This is backed by Flux, which enables software and applications to be continuously deployed (CD) using GitOps processes.
- id: q137
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What is GitOps?
  options:
  - id: a
    text: A backup method
  - id: b
    text: A strategy where the configuration describing how an app is deployed is stored in Git and continuously synchronized to the cluster so its state matches the repo
  - id: c
    text: A monitoring tool
  - id: d
    text: A CNI
  correct: b
  explanation: GitOps stores the configuration describing how an app is deployed in a Git repo and continuously synchronizes it to the cluster so the cluster's state always matches the repo.
  source:
    label: GitOps
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-gitops-c.html
    page: ''
    quote: The configuration that describes how your application is deployed to a cluster are stored in a Git repository. The configuration is continuously synchronized from the Git repository to the cluster…
- id: q138
  type: multiple_choice
  difficulty: core
  points: 15
  prompt: Which are benefits of a GitOps deployment strategy? (Select all that apply)
  options:
  - id: a
    text: A familiar, collaborative change/review process (branches, pull requests, reviews)
  - id: b
    text: A clear change log and audit trail (Git commit log + Kubernetes Events)
  - id: c
    text: Avoiding configuration drift with a single source of truth
  - id: d
    text: Eliminating the need for RBAC
  correct:
  - a
  - b
  - c
  explanation: 'GitOps benefits: a familiar collaborative change/review process, a clear change log and audit trail (Git log + Kubernetes Events), and avoiding configuration drift via a single source of truth.'
  source:
    label: GitOps
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-gitops-c.html
    page: ''
    quote: Familiar, collaborative change and review process… Clear change log and audit trail… Avoid configuration drift… a single source of truth for cluster and application configuration.
- id: q139
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Where do you configure CD in the NKP UI, and what do you create first?
  options:
  - id: a
    text: Global > Licensing; a token
  - id: b
    text: The Continuous Deployment (CD) tab under your Project — create a secret first, then a GitOps source that uses it
  - id: c
    text: Clusters > Delete
  - id: d
    text: Administration > Providers
  correct: b
  explanation: Configure CD in the Continuous Deployment (CD) tab under your Project — create a secret first, then a GitOps source that the secret accesses.
  source:
    label: Continuous Deployment
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-continuous-deployment-c.html
    page: p.442
    quote: Nutanix recommends that you create a secret first then create a GitOps source accessed by the secret.
- id: q141
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: For live debugging of an incident, how do you temporarily stop GitOps from reverting your changes?
  options:
  - id: a
    text: Delete the repo
  - id: b
    text: Disable the auto sync feature — Flux stops synchronizing cluster state from the GitOps repo so you can use kubectl/helm
  - id: c
    text: Uninstall Flux
  - id: d
    text: Delete the cluster
  correct: b
  explanation: Disable the auto sync feature — Flux stops synchronizing the cluster state from the GitOps repo, letting you use kubectl/helm to resolve the incident.
  source:
    label: GitOps
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-gitops-c.html
    page: ''
    quote: Kommander's CD strategy supports this scenario by letting you disable the auto sync feature. After auto sync is disabled, Flux will stop synchronizing the cluster state from the GitOps git repository.
- id: q142
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: What security is automatically applied when using the Project CD feature?
  options:
  - id: a
    text: None
  - id: b
    text: A dedicated service account (named after the Project) with namespace-restricted RBAC is automatically generated, isolating tenant access to their namespace
  - id: c
    text: Full cluster-admin
  - id: d
    text: A firewall rule
  correct: b
  explanation: When you use the Project CD feature, a dedicated service account named after the Project is automatically generated with namespace-restricted RBAC, isolating tenant access to their namespace.
  source:
    label: Project Developer Security
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-project-dev-security-c.html
    page: ''
    quote: This service account with the same name as the Project name is configured with limited RBAC permissions, restricting its access solely to the namespace where the resources are provisioned.
- id: q144
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: How do you add clusters to an existing Project?
  options:
  - id: a
    text: Reinstall NKP
  - id: b
    text: Select clusters manually, or (recommended) apply/adjust labels so matching clusters are added dynamically
  - id: c
    text: Delete the project
  - id: d
    text: You cannot add clusters after creation
  correct: b
  explanation: Add clusters by selecting them manually or (recommended) applying/adjusting labels so matching clusters are added dynamically.
  source:
    label: Create a Project Using the UI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform:top-create-a-project-using-ui-t.html
    page: ''
    quote: you can either select manually existing clusters or define labels that Kommander will use to dynamically add clusters.
- id: q150
  type: multiple_choice
  difficulty: core
  points: 10
  prompt: Which Kubernetes object defines Project Quotas?
  options:
  - id: a
    text: ResourceQuota
  - id: b
    text: A FederatedResourceQuota named 'kommander'
  - id: c
    text: LimitRange only
  - id: d
    text: A ConfigMap
  correct: b
  explanation: Project Quotas are defined using a Kubernetes FederatedResourceQuota named 'kommander'.
  source:
    label: Creating Project Quotas and Limit Ranges Using the CLI
    url: https://portal.nutanix.com/page/documents/details?targetId=Nutanix-Kubernetes-Platform-v2_18:top-creating-project-quotas-and-limit-ranges-using-cli-t.html
    page: ''
    quote: All the Project Quotas are defined using a Kubernetes FederatedResourceQuota called kommander which you can also create/update using kubectl.
